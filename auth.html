<!DOCTYPE html>
<html lang="ha">
<head>
    <meta charset="UTF-8">
    <title>SYNERGY ACCESS | LOGIN</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#020617] flex items-center justify-center h-screen">
    <div class="p-10 rounded-[32px] border border-cyan-500/30 bg-white/5 text-center">
        <h2 class="text-cyan-400 font-bold mb-6">SHIGA PROTOCOL</h2>
        <input type="text" id="username" placeholder="Sunan Mamba (misali: sadiq_01)" class="p-4 rounded-xl bg-black border border-white/10 text-white mb-4 w-full">
        <button onclick="login()" class="w-full py-4 bg-cyan-500 rounded-xl font-bold">ENTER</button>
    </div>

    <script>
async function login() {
    const username = document.getElementById('username').value.toLowerCase().trim();
    
    const userRef = db.collection("users").doc(username);
    const doc = await userRef.get();

    if (doc.exists) {
        localStorage.setItem('synergy_user', username);
        window.location.href = 'dashboard.html';
    } else {
        alert("Ba a samu wannan sunan ba! Sai ka fara rijista.");
    }
}
        
    </script>
</body>
</html>
