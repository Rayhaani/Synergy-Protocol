<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SYNERGY | LOGOUT</title>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@300;500;700&family=Syncopate:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --aqua: #00f2fe; --bg: #030712; }
        
        body { 
            background: var(--bg); color: #fff; 
            font-family: 'Quicksand', sans-serif;
            background-image: 
                linear-gradient(to bottom, rgba(0, 242, 254, 0.03) 1px, transparent 1px),
                linear-gradient(to right, rgba(0, 242, 254, 0.03) 1px, transparent 1px);
            background-size: 30px 30px;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
        }
        
        .orbitron { font-family: 'Syncopate', sans-serif; text-transform: uppercase; letter-spacing: 2px; }
        
        .glass-card { 
            background: rgba(255, 255, 255, 0.01); 
            backdrop-filter: blur(30px); 
            border: 1px solid rgba(0, 242, 254, 0.1);
            padding: 3rem;
            border-radius: 24px;
            width: 100%;
            max-width: 450px;
            text-align: center;
            box-shadow: 0 0 50px rgba(0, 0, 0, 0.5);
        }

        .glow-text { text-shadow: 0 0 15px var(--aqua); }

        .btn-login {
            background: rgba(0, 242, 254, 0.05);
            border: 1px solid var(--aqua);
            color: var(--aqua);
            padding: 12px 30px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: all 0.3s ease;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
        }

        .btn-login:hover {
            background: var(--aqua);
            color: #000;
            box-shadow: 0 0 20px rgba(0, 242, 254, 0.4);
        }

        .icon-box {
            font-size: 40px;
            margin-bottom: 20px;
            filter: drop-shadow(0 0 10px var(--aqua));
        }
    </style>
</head>
<body>

    <div class="glass-card">
        <div class="icon-box">🔐</div>
        <h1 class="orbitron text-xl font-bold glow-text mb-2">Logged Out</h1>
        <p class="text-gray-400 text-sm mb-8 tracking-wide">An katse zaman ka lafiya (Session Terminated).</p>
        
        <div class="space-y-4">
            <p class="text-[10px] text-cyan-400/50 uppercase tracking-[4px] mb-6">Synergy Protocol Secure</p>
            <a href="index.html" class="btn-login">Back to Login</a>
        </div>
    </div>

</body>
</html>
