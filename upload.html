<!DOCTYPE html>
<html lang="ha">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SYNERGY | ADMIN VAULT</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@700&family=Space+Grotesk:wght@300;500;700&family=Roboto+Mono&display=swap" rel="stylesheet">
    
    <style>
        :root { --aqua: #00f2fe; --purple: #7000ff; --bg: #020617; }
        body { 
            background: var(--bg); color: #fff; font-family: 'Space Grotesk', sans-serif;
            background-image: radial-gradient(circle at 0% 0%, rgba(0, 242, 254, 0.05), transparent), url('https://www.transparenttextures.com/patterns/carbon-fibre.png');
            min-height: 100vh; padding: 20px;
        }
        .orbitron { font-family: 'Syncopate', sans-serif; letter-spacing: 4px; }
        .glass-card { 
            background: rgba(255, 255, 255, 0.02); backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 30px;
        }
        .neo-input {
            background: rgba(0, 0, 0, 0.3); border: 1px solid rgba(0, 242, 254, 0.2);
            border-radius: 15px; padding: 15px; color: white; width: 100%; outline: none;
            font-family: 'Roboto Mono', monospace;
        }
        .neo-input:focus { border-color: var(--aqua); box-shadow: 0 0 15px rgba(0, 242, 254, 0.2); }
        .btn-action {
            background: linear-gradient(90deg, var(--aqua), var(--purple));
            color: black; font-weight: bold; padding: 15px 30px; border-radius: 15px;
            text-transform: uppercase; letter-spacing: 2px; transition: 0.3s;
        }
        .btn-action:hover { transform: scale(1.02); box-shadow: 0 0 20px rgba(0, 242, 254, 0.4); }
        .video-item {
            background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 20px; padding: 15px; margin-bottom: 10px; display: flex;
            justify-content: space-between; align-items: center;
        }
    </style>
</head>
<body>

    <main class="max-w-4xl mx-auto space-y-10">
        <header class="flex justify-between items-center">
            <div>
                <h1 class="orbitron text-xl text-aqua">Central Command</h1>
                <p class="text-xs text-gray-500 uppercase tracking-widest mt-1">Firebase Video Management</p>
            </div>
            <div class="h-10 w-10 rounded-full border border-aqua/30 flex items-center justify-center animate-pulse">
                <div class="h-2 w-2 bg-aqua rounded-full"></div>
            </div>
        </header>

        <section class="glass-card p-8">
            <h2 class="orbitron text-[10px] text-gray-400 mb-6">Register New Video ID</h2>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <input type="text" id="video-id-input" class="neo-input" placeholder="YouTube Video ID (e.g. dQw4w9WgXcQ)">
                <input type="text" id="video-title-input" class="neo-input" placeholder="Video Title (Optional)">
            </div>
            <button onclick="uploadToVault()" class="btn-action w-full mt-6 orbitron text-[10px]">Deploy to Firebase</button>
        </section>

        <section class="glass-card p-8">
            <div class="flex justify-between items-center mb-6">
                <h2 class="orbitron text-[10px] text-gray-400">Live Video Vault</h2>
                <span id="video-count" class="text-aqua font-bold text-xs bg-aqua/10 px-3 py-1 rounded-full">0 Units</span>
            </div>
            <div id="video-list-container">
                <p class="text-center text-gray-600 text-sm py-10">Syncing with Firebase Cloud...</p>
            </div>
        </section>
    </main>

    <script>
        // 1. FIREBASE CONFIG (Saka naka na asali)
        const firebaseConfig = { 
            apiKey: "AIzaSyDLTwLq8Le9vYAwRkRcqXPGxFnEqW1yE2E", 
            authDomain: "synergy-protocol.firebaseapp.com", 
            projectId: "synergy-protocol", 
            storageBucket: "synergy-protocol.firebasestorage.app", 
            messagingSenderId: "179647543031", 
            appId: "1:179647543031:web:388da8a36e1bbbb55d85f2" 
        };

        if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
        const db = firebase.firestore();

        // 2. UPLOAD TO FIREBASE
        async function uploadToVault() {
            const vidId = document.getElementById('video-id-input').value.trim();
            const vidTitle = document.getElementById('video-title-input').value.trim() || "Untitled Video";

            if (!vidId) {
                alert("Please enter a valid YouTube Video ID!");
                return;
            }

            try {
                await db.collection("playlist").add({
                    videoId: vidId,
                    title: vidTitle,
                    addedAt: firebase.firestore.FieldValue.serverTimestamp()
                });
                document.getElementById('video-id-input').value = "";
                document.getElementById('video-title-input').value = "";
                alert("SUCCESS: Video ID deployed to Synergy Vault!");
            } catch (e) {
                console.error(e);
                alert("Upload failed. Check Console.");
            }
        }

        // 3. LISTEN FOR LIVE CHANGES
        db.collection("playlist").orderBy("addedAt", "desc").onSnapshot(snapshot => {
            const container = document.getElementById('video-list-container');
            const countLabel = document.getElementById('video-count');
            container.innerHTML = "";
            countLabel.innerText = `${snapshot.size} Units`;

            if (snapshot.empty) {
                container.innerHTML = `<p class="text-center text-gray-600 text-sm py-10">No videos found in vault.</p>`;
                return;
            }

            snapshot.forEach(doc => {
                const data = doc.data();
                const item = document.createElement('div');
                item.className = "video-item";
                item.innerHTML = `
                    <div class="flex items-center gap-4">
                        <div class="w-12 h-12 rounded-lg bg-black flex items-center justify-center border border-white/5">
                            <span class="text-aqua text-xs">YT</span>
                        </div>
                        <div>
                            <h4 class="text-sm font-bold text-white">${data.title}</h4>
                            <p class="text-[10px] text-gray-500 font-mono">${data.videoId}</p>
                        </div>
                    </div>
                    <button onclick="deleteFromVault('${doc.id}')" class="p-2 hover:bg-red-500/20 rounded-lg group transition-all">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#ff4444" stroke-width="2" class="group-hover:scale-110">
                            <path d="M3 6h18m-2 0v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
                        </svg>
                    </button>
                `;
                container.appendChild(item);
            });
        });

        // 4. DELETE FROM FIREBASE
        async function deleteFromVault(docId) {
            if (confirm("Are you sure you want to remove this video from the protocol?")) {
                await db.collection("playlist").doc(docId).delete();
            }
        }
    </script>
</body>
</html>
