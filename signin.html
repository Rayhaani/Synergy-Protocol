<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SYNERGY | LOGIN NODE</title>
    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@400;700&family=Space+Grotesk:wght@300;500;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    

    <style>
        :root { --aqua: #00f2fe; --purple: #7000ff; --bg: #020617; }
        body {
    margin: 0;
    padding: 0;
    width: 100vw;
    height: 100vh;
    /* Wannan shi ne babban sirrin daskare shafi */
    overflow: hidden; 
    position: fixed;
    
    background-color: #020617;
    background-image: 
        radial-gradient(circle at 50% 50%, rgba(112, 0, 255, 0.15), transparent), 
        url('https://www.transparenttextures.com/patterns/carbon-fibre.png');
    background-attachment: fixed;
    
    color: #ffffff;
    font-family: 'Space Grotesk', sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
    /* Don hana waya yin "pull-to-refresh" ko motsi idan an taba */
    touch-action: none; 
        }
        
      
        .glass-card { 
            background: rgba(255, 255, 255, 0.02); 
            backdrop-filter: blur(40px); 
            border: 1px solid rgba(255, 255, 255, 0.08); 
            border-top: 1px solid rgba(0, 242, 254, 0.3);
        }
        .orbitron { font-family: 'Syncopate', sans-serif; text-transform: uppercase; letter-spacing: 2px; }
        
        /* Step Animation - Exactly as provided */
        .step-hidden { opacity: 0; transform: translateY(20px); pointer-events: none; display: none; }
        .step-visible { 
            display: block;
            animation: reveal 0.6s cubic-bezier(0.4, 0, 0.2, 1) forwards; 
        }

        @keyframes reveal {
            from { opacity: 0; transform: translateY(20px); filter: blur(10px); }
            to { opacity: 1; transform: translateY(0); filter: blur(0); }
        }

        .input-glow:focus { 
            border-color: var(--aqua); 
            box-shadow: 0 0 20px rgba(0, 242, 254, 0.15); 
        }

        .btn-locked { opacity: 0.2; cursor: not-allowed; filter: grayscale(1); }
   


        /* SYNERGY PROTOCOL - GLOBAL BACKGROUND ENGINE */
body {
    margin: 0;
    padding: 0;
    min-height: 100vh;
    background-color: #020617; /* Deep Space Blue-Black */
    
    /* Wannan shi ne hadin Radial Gradient da Carbon Fibre Texture */
    background-image: 
        radial-gradient(circle at 50% 50%, rgba(112, 0, 255, 0.15), transparent), 
        url('https://www.transparenttextures.com/patterns/carbon-fibre.png');
    
    /* Wannan zai sa background din ya tsaya wuri daya koda ana scrolling (Premium Feel) */
    background-attachment: fixed;
    
    color: #ffffff;
    font-family: 'Space Grotesk', sans-serif;
    overflow-x: hidden;
}

/* Kyautatawa: Karin haske ga Glassmorphism cards a kan wannan background din */
.glass-premium {
    background: rgba(255, 255, 255, 0.02);
    backdrop-filter: blur(40px) saturate(180%);
    border: 1px solid rgba(255, 255, 255, 0.08);
    border-top: 1px solid rgba(0, 242, 254, 0.3); /* Neon line a sama */
    border-radius: 24px;
}
    
    </style>
</head>
<body>

    <div class="glass-card p-6 rounded-[30px] w-full max-w-md mx-4">
        <div class="text-center mb-6">
               </div>

        <div class="text-center mb-6">
    <div class="w-10 h-10 bg-cyan-500 rounded-full mx-auto mb-3 shadow-[0_0_15px_#00f2fe]"></div>
    
    <h1 class="main-heading text-[18px] font-extrabold text-white mb-1">Synergy Protocol</h1>
    
    <p id="progress-text" class="text-[9px] text-cyan-400 tracking-[2px] uppercase">Identity Verification</p>
        </div>

        
        <div id="form-container" class="space-y-3">
            <div id="step-1" class="step-visible">
                <label class="text-[9px] orbitron text-gray-400 ml-2 mb-1 block">Username / Email</label>
                <input type="text" id="login-id" oninput="validateLogin()" placeholder="Enter ID" 
                       class="w-full bg-white/5 border border-white/10 p-3 rounded-xl outline-none input-glow transition-all text-white text-md">
            </div>

            <div id="step-2" class="step-hidden">
                <label class="text-[9px] orbitron text-gray-400 ml-2 mb-1 block">Access Password</label>
                <input type="password" id="login-pass" oninput="validateLogin()" placeholder="••••••••" 
                       class="w-full bg-white/5 border border-white/10 p-3 rounded-xl outline-none input-glow transition-all text-white text-md">
            </div>

            <button id="login-btn" onclick="login()" disabled 
                    class="btn-locked w-full bg-gradient-to-r from-cyan-400 to-blue-500 text-black py-4 rounded-xl font-bold orbitron text-[11px] mt-2 transition-all duration-500">
                ACCESS PROTOCOL
            </button>
        </div>

        <p class="text-[10px] text-center mt-4">
    <a href="#" onclick="forgotPassword()" class="text-cyan-400 hover:underline">Forgot Password?</a>
</p>


        <div class="mt-6 pt-4 border-t border-white/5 text-center">
            <p class="text-gray-500 text-[10px] orbitron">Unauthorized Access Prohibited</p>
        </div>
    </div>

    <script>
        
        
const firebaseConfig = { 
    apiKey: "AIzaSyDLTwLq8Le9vYAwRkRcqXPGxFnEqW1yE2E", 
    authDomain: "synergy-protocol.firebaseapp.com", 
    projectId: "synergy-protocol" 
};
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

function showTopNotif(message, type) {
    let bar = document.getElementById('notification-bar');
    if (!bar) {
        bar = document.createElement('div');
        bar.id = 'notification-bar';
        bar.style = "position:fixed; top:-100px; left:50%; transform:translateX(-50%); width:90%; max-width:400px; padding:12px; border-radius:8px; display:flex; justify-content:space-between; z-index:9999; transition:0.4s; font-size:12px; font-family:sans-serif; border:1px solid rgba(0,242,254,0.3);";
        document.body.appendChild(bar);
    }
    bar.style.background = (type === 'success') ? '#0c2d21' : '#2d1616';
    bar.style.color = (type === 'success') ? '#3fb950' : '#f85149';
    bar.innerHTML = `<span>${message}</span><span style="cursor:pointer" onclick="this.parentElement.style.top='-100px'">×</span>`;
    bar.style.top = '20px';
    setTimeout(() => { bar.style.top = '-100px'; }, 5000);
}

function validateLogin() {
    const loginID = document.getElementById('login-id').value.trim();
    const loginPass = document.getElementById('login-pass').value.trim();
    const btn = document.getElementById('login-btn');
    
    // WANNAN SHI NE ZAI BUDE PASSWORD FIELD
    if (loginID.length >= 3) { 
        show(2); 
    } else { 
        hide(2); 
    }
    
    if (loginID.length >= 3 && loginPass.length >= 6) {
        btn.disabled = false;
        btn.classList.remove('btn-locked');
    } else {
        btn.disabled = true;
        btn.classList.add('btn-locked');
    }
}

function show(id) {
    const el = document.getElementById(`step-${id}`);
    if(el) { el.classList.remove('step-hidden'); el.classList.add('step-visible'); }
}

function hide(id) {
    const el = document.getElementById(`step-${id}`);
    if(el) { el.classList.add('step-hidden'); el.classList.remove('step-visible'); }
}

async function login() {
    const loginInput = document.getElementById('login-id').value.trim();
    const pass = document.getElementById('login-pass').value.trim();
    const btn = document.getElementById('login-btn');

    btn.innerText = "CONNECTING...";
    btn.disabled = true;

    try {
        let email = loginInput;

        // 1. Nemo Email daga Username (Firestore Check)
        if (!loginInput.includes('@')) {
            const userRef = db.collection("users").doc(loginInput.toLowerCase());
            const doc = await userRef.get();
            if (doc.exists) {
                email = doc.data().email;
            } else {
                showTopNotif("Username not found in protocol.", "error");
                btn.innerText = "ACCESS PROTOCOL";
                btn.disabled = false;
                return;
            }
        } // <--- WANNAN SHI NE RUFEWAR DA TAKE RASHI A CODE DIN KA

        // 2. Tabbatar da Authentication (Firebase Auth)
        const userCredential = await firebase.auth().signInWithEmailAndPassword(email, pass);
        const user = userCredential.user;

        // 3. Duba Email Verification
        if (!user.emailVerified) {
            showTopNotif("Please verify your email first.", "error");
            btn.innerText = "ACCESS PROTOCOL";
            btn.disabled = false;
            return;
        }

        // 4. SABON GYARA: Nemo ainihin Username (Document ID)
        let finalUsername = "";
        const usersSnapshot = await db.collection("users").where("email", "==", email.toLowerCase()).get();

        if (!usersSnapshot.empty) {
            finalUsername = usersSnapshot.docs[0].id; 
            localStorage.setItem('synergy_user', finalUsername);
        } else {
            localStorage.setItem('synergy_user', loginInput.toLowerCase());
        }

        // 5. Tura shi Dashboard
        showTopNotif("Access Granted! Connecting...", "success");
        setTimeout(() => { 
            window.location.href = "dashboard.html"; 
        }, 1200);

    } catch (error) {
        console.error("Firebase Error:", error.code, error.message);
        if (error.code === "auth/user-not-found" || error.code === "auth/invalid-credential") {
            showTopNotif("Invalid credentials. Try again.", "error");
        } else if (error.code === "auth/wrong-password") {
            showTopNotif("Incorrect password.", "error");
        } else {
            showTopNotif("Error: " + error.message, "error");
        }
        btn.innerText = "ACCESS PROTOCOL";
        btn.disabled = false;
    }
}

function forgotPassword() {
    const email = prompt("Please enter your registered Email address:");
    if (email) {
        firebase.auth().sendPasswordResetEmail(email)
            .then(() => { alert("Password reset link sent!"); })
            .catch((error) => { alert("Error: " + error.message); });
    }
        }
    
    


        
        
    
    </script>
</body>
</html>
