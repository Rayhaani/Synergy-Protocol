<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SYNERGY | ADAPTIVE NODE</title>
    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@400;700&family=Space+Grotesk:wght@300;500;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    

    <style>
        :root { --aqua: #00f2fe; --purple: #7000ff; --bg: #020617; }
        body { background: var(--bg); color: #fff; font-family: 'Space Grotesk', sans-serif; min-height: 100vh; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .orbitron { font-family: 'Syncopate', sans-serif; text-transform: uppercase; letter-spacing: 3px; font-size: 10px; }
        
        /* GYARA 1: Mun rage padding da max-height don button ya fito fili */
        .glass-card { 
            background: rgba(255, 255, 255, 0.02); 
            backdrop-filter: blur(40px); 
            border: 1px solid rgba(255, 255, 255, 0.08); 
            border-top: 1px solid rgba(0, 242, 254, 0.3); 
            transition: all 0.5s ease;
            max-height: 95vh; 
            overflow-y: auto;
        }
        
        .input-node { width: 100%; background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); padding: 12px; border-radius: 15px; outline: none; color: white; transition: 0.3s; }
        .input-node:focus { border-color: var(--aqua); box-shadow: 0 0 15px rgba(0, 242, 254, 0.1); }
        
        .resend-btn-neon {
            background: transparent !important;
            border: 1px solid var(--aqua) !important;
            color: var(--aqua) !important;
            box-shadow: 0 0 15px rgba(0, 242, 254, 0.3);
            font-family: 'Syncopate', sans-serif !important;
            font-size: 11px !important;
            padding: 16px 40px !important;
            border-radius: 20px !important;
            transition: 0.4s !important;
            letter-spacing: 2px;
        }
        .resend-btn-neon:hover { background: var(--aqua) !important; color: #000 !important; box-shadow: 0 0 30px var(--aqua); }


        /* GITHUB STYLE NOTIFICATION BAR */
#notification-bar {
    position: fixed;
    top: -100px; /* Boyayye a farko */
    left: 50%;
    transform: translateX(-50%);
    width: 90%;
    max-width: 450px;
    padding: 12px 20px;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    font-size: 13px;
    font-family: 'Space Grotesk', sans-serif;
    z-index: 9999;
    transition: top 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    border: 1px solid rgba(0, 242, 254, 0.3);
}

.notif-success { background: #0c2d21; color: #3fb950; border-color: #238636 !important; }
.notif-error { background: #2d1616; color: #f85149; border-color: #da3633 !important; }

#notification-bar.show { top: 20px; } /* Zai fito idan an kira shi */

.close-notif { cursor: pointer; font-weight: bold; font-size: 18px; margin-left: 15px; }
        
    
            </style>
</head>
<body>
<div id="notification-bar">
    <span id="notif-message"></span>
    <span class="close-notif" onclick="closeNotif()">×</span>
</div>
    
    <div id="main-register-card" class="glass-card p-6 rounded-[35px] w-full max-w-md mx-4 relative z-10">
        <div class="text-center mb-6">
            <div class="w-12 h-12 bg-cyan-500 rounded-full mx-auto mb-4 shadow-[0_0_20px_#00f2fe]"></div>
            <h1 class="orbitron font-bold text-white">Synergy Protocol</h1>
            <p id="progress-text" class="orbitron text-cyan-400 mt-2" style="font-size: 8px;">Initialize Sequence: 0%</p>
        </div>

        <div id="form-content" class="space-y-3">
            <div><label class="orbitron text-gray-500 ml-1 mb-1 block">Full Name</label><input type="text" id="full-name" oninput="validateForm()" class="input-node"></div>
            <div id="step-email" class="hidden"><label class="orbitron text-gray-500 ml-1 mb-1 block">Email Address</label><input type="email" id="email" oninput="validateForm()" class="input-node"></div>
            <div id="step-user" class="hidden"><label class="orbitron text-gray-500 ml-1 mb-1 block">Username</label><input type="text" id="username" oninput="validateForm()" class="input-node"></div>
            <div id="step-state" class="hidden"><label class="orbitron text-gray-500 ml-1 mb-1 block">State</label><input type="text" id="state" oninput="validateForm()" class="input-node"></div>
            <div id="step-phone" class="hidden">
    <label class="orbitron text-gray-500 ml-1 mb-1 block">WhatsApp Number</label>
    <input type="tel" id="phone" oninput="validateForm()" placeholder="08012345678" class="input-node">
            </div>
            <div id="step-pass" class="hidden"><label class="orbitron text-gray-500 ml-1 mb-1 block">Password</label><input type="password" id="password" oninput="validateForm()" class="input-node"></div>
            
            <button id="reg-btn" onclick="register()" disabled class="w-full bg-white text-black py-4 rounded-2xl font-bold orbitron mt-2 opacity-20 cursor-not-allowed transition-all duration-500">ACTIVATE PROTOCOL</button>
        </div>
    </div>

    <script>
        // 1. Bayanan Hadin Gwiwa (Firebase Configuration)
const firebaseConfig = { 
    apiKey: "AIzaSyDLTwLq8Le9vYAwRkRcqXPGxFnEqW1yE2E", 
    authDomain: "synergy-protocol.firebaseapp.com", 
    projectId: "synergy-protocol",
    // Tabbatar wannan URL din ya yi daidai da na Firebase Console dinka
    databaseURL: "https://synergy-protocol-default-rtdb.firebaseio.com" 
};

// 2. Tada Tsarin (Initialize Firebase)
// Mun sanya shi a cikin variable 'app' domin komai ya zama standard
const app = firebase.initializeApp(firebaseConfig);

// 3. Saita Manhajoji (Initialize Services)
const db = firebase.firestore();      // Domin Profile da Security
const database = firebase.database(); // Domin Network da Realtime Data
const auth = firebase.auth();           // Domin Shiga da Fita (Authentication)

// 4. Saita Timer (Global Variables)
// Wannan shi ne zai hana "checkInterval is not defined" error
let checkInterval = null; 

// 5. Neman Referrer (Helper Function)
// Zai taimaka wajen gano wanda ya gayyaci mamba tun a farkon loda shafin
function getReferrerFromURL() {
    const params = new URLSearchParams(window.location.search);
    return params.get('ref') || "admin";
}
        
        function validateForm() {
            const fullName = document.getElementById('full-name').value.trim();
            const email = document.getElementById('email').value.trim();
            const user = document.getElementById('username').value.trim();
            const state = document.getElementById('state').value.trim();
            const phone = document.getElementById('phone').value.trim();
            const pass = document.getElementById('password').value.trim();

            const steps = [ 
                { el: 'step-email', valid: fullName.split(' ').length >= 2 }, 
                { el: 'step-user', valid: email.includes('@') && email.includes('.') }, 
                { el: 'step-state', valid: user.length >= 3 }, 
                { el: 'step-phone', valid: state.length >= 3 }, 
                { el: 'step-pass', valid: phone.length >= 10 },
                { el: 'reg-btn', valid: pass.length >= 6 }
            ];
            
            let completed = 0;
            steps.forEach(s => {
                const target = document.getElementById(s.el);
                if (s.valid) {
                    if (target.id === 'reg-btn') { target.disabled = false; target.style.opacity = "1"; }
                    else { target.classList.remove('hidden'); }
                    completed++;
                }
            });
            document.getElementById('progress-text').innerText = `Initialize Sequence: ${Math.round((completed/6)*100)}%`;
        }

        // GYARA 3: GitHub Style Top Notification (Resend logic)
        // Function na nuna sanarwa a sama (GitHub Style)
function showTopNotif(message, type) {
    const bar = document.getElementById('notification-bar');
    const msg = document.getElementById('notif-message');
    
    bar.className = (type === 'success') ? 'notif-success show' : 'notif-error show';
    msg.innerText = message;

    // Zai bace bayan sakan 5
    setTimeout(closeNotif, 5000);
}

function closeNotif() {
    document.getElementById('notification-bar').classList.remove('show');
}


     function showSuccessOverlay(email) {
    // 1. Mun fara duba email din a background
    startVerificationListener(); 

    Swal.fire({
        html: `
            <div class="flex flex-col items-center">
                <div class="w-12 h-12 bg-cyan-500 rounded-full mb-6 shadow-[0_0_20px_#00f2fe]"></div>
                <h2 class="orbitron text-white text-xl mb-6">REGISTRATION SUCCESSFUL</h2>
                <div style="background: rgba(255,255,255,0.03); padding: 25px; border-radius: 20px; border: 1px dashed rgba(0,242,254,0.3); width: 100%; color: #fff;">
                    <p style="font-family: 'Quicksand', sans-serif; font-size: 15px; line-height: 1.6;">Email sent to <b style="color:#00f2fe;">${email}</b>. Verify to proceed.</p>
                    <p class="animate-pulse" style="font-size: 11px; color: #3fb950; margin-top: 10px; font-family: 'Syncopate', sans-serif;">Waiting for verification...</p>
                </div>
            </div>`,
        background: '#020617', 
        showConfirmButton: true, 
        confirmButtonText: 'RESEND LINK', 
        allowOutsideClick: false,
        customClass: { 
            popup: 'rounded-[35px] border border-cyan-500/30 shadow-2xl', 
            confirmButton: 'resend-btn-neon orbitron' 
        }
    }).then((result) => {
        if (result.isConfirmed) { 
            resendVerification(); 
            showSuccessOverlay(email); 
        }
    });
     }
        

       // 1. GYARARREN RESEND FUNCTION (Don ya fito a bar)
async function resendVerification() {
    try {
        const fbUser = firebase.auth().currentUser;
        if (fbUser) {
            await fbUser.sendEmailVerification();
            showTopNotif("Your verification link has been resent", "success");
        }
    } catch (err) {
        showTopNotif("Security protocol active. Please wait a moment.", "error");
    }
}

// 2. GYARARREN REGISTER FUNCTION (Don magance duplicate Email/User)


      async function register() {
    const btn = document.getElementById('reg-btn');
    const mainCard = document.getElementById('main-register-card'); 
    const email = document.getElementById('email').value.trim();
    const user = document.getElementById('username').value.toLowerCase().trim();
    const pass = document.getElementById('password').value.trim();
    const rawPhone = document.getElementById('phone').value.trim();

    // Reset button don fara aiki
    btn.disabled = true;
    btn.innerHTML = `<span class="orbitron animate-pulse">CONNECTING...</span>`;

    // 1. GYARA LAMBAR WHATSAPP
    let formattedPhone = rawPhone;
    if (rawPhone.startsWith('0')) {
        formattedPhone = '234' + rawPhone.substring(1);
    } else if (!rawPhone.startsWith('234') && rawPhone !== "") {
        formattedPhone = '234' + rawPhone;
    }

    try {
        // A. DUBA USERNAME (A Firestore)
        const userRef = db.collection("users").doc(user);
        const doc = await userRef.get();
        if (doc.exists) {
            throw new Error("Username is already taken.");
        }

        // B. DUBA EMAIL (A Auth)
        const signInMethods = await firebase.auth().fetchSignInMethodsForEmail(email);
        if (signInMethods.length > 0) {
            throw new Error("Email address already registered.");
        }

        // C. CREATE ACCOUNT & SEND VERIFICATION
        const userCredential = await firebase.auth().createUserWithEmailAndPassword(email, pass);
        await userCredential.user.sendEmailVerification();
        
        // --- MATAKI MAFI MUHIMMANCI ---
        // Da zarar an tura email, mu boye tsohon shafin kafin mu nuna overlay
        mainCard.style.display = 'none';
        showSuccessOverlay(email); 
        // ------------------------------

        // D. ADANA BAYANAN A FIRESTORE
        await userRef.set({
            uid: userCredential.user.uid,
            fullName: document.getElementById('full-name').value.trim(),
            email: email, 
            username: user,
            state: document.getElementById('state').value.trim(),
            whatsapp: formattedPhone, 
            videoBalance: 0, 
            shareBalance: 0, 
            isVerified: false,
            rank: "IRON", 
            videosWatchedToday: 0,
            lastActivityDate: new Date().toLocaleDateString('en-GB', { timeZone: 'Africa/Lagos' }),
            createdAt: firebase.firestore.FieldValue.serverTimestamp(),
            referredBy: getReferrerFromURL() 
        });

        // E. ADANA BAYANAN A REALTIME DATABASE
        await database.ref('users/' + user).set({
            whatsapp: formattedPhone,
            balance: 0,
            referredBy: getReferrerFromURL(),
            last_update: new Date().toISOString()
        });

    } catch (e) {
        // Idan aka samu error, nuna shi sannan dawo da shafin idan ya bace
        console.error("Critical Error:", e);
        showTopNotif(e.message, "error");
        
        mainCard.style.display = 'block'; 
        btn.disabled = false;
        btn.innerText = "RETRY ACTIVATION";
    }
      }
                

        
       function startVerificationListener() {
    // 1. Tabbatar mun kashe duk wani tsohon timer don gudun rudani
    if (checkInterval) clearInterval(checkInterval);

    checkInterval = setInterval(async () => {
        const currentUser = firebase.auth().currentUser;
        
        if (currentUser) {
            // 2. WANNAN SHINE MUHIMMI: Tilasta wa Firebase sake duba status din user
            await currentUser.reload(); 
            
            if (currentUser.emailVerified) {
                // 3. Tsayar da binciken tunda an riga an yi verify
                clearInterval(checkInterval); 

                // 4. Nuna sako sannan a tura shi zuwa Signin
                showTopNotif("Security Verified! Redirecting...", "success");

                setTimeout(() => {
                    window.location.href = "signin.html"; // Tabbatar sunan file din ya yi daidai
                }, 1500);
            }
        }
    }, 3000); // Yana dubawa duk bayan sakan 3
       }
        
                

        
    </script>
</body>
    </html>
