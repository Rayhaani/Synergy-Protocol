<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SYNERGY | ADAPTIVE NODE</title>
    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@400;700&family=Space+Grotesk:wght@300;500;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>

    <style>
        :root { --aqua: #00f2fe; --purple: #7000ff; --bg: #020617; }
        body { background: var(--bg); color: #fff; font-family: 'Space Grotesk', sans-serif; min-height: 100vh; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .orbitron { font-family: 'Syncopate', sans-serif; text-transform: uppercase; letter-spacing: 3px; font-size: 10px; }
        .glass-card { background: rgba(255, 255, 255, 0.02); backdrop-filter: blur(40px); border: 1px solid rgba(255, 255, 255, 0.08); border-top: 1px solid rgba(0, 242, 254, 0.3); transition: all 0.5s ease; }
        .input-node { width: 100%; background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); padding: 14px; border-radius: 15px; outline: none; color: white; transition: 0.3s; }
        .input-node:focus { border-color: var(--aqua); box-shadow: 0 0 15px rgba(0, 242, 254, 0.1); }
        .fade-out { opacity: 0; transform: scale(0.9); pointer-events: none; }

        /* FUTURISTIC OVERLAY STYLING */
        .synergy-popup {
            background: rgba(2, 6, 23, 0.95) !important;
            border: 2px solid var(--aqua) !important;
            border-radius: 40px !important;
            box-shadow: 0 0 50px rgba(0, 242, 254, 0.2) !important;
        }
        .resend-btn-neon {
            background: transparent !important;
            border: 1px solid var(--aqua) !important;
            color: var(--aqua) !important;
            box-shadow: 0 0 15px rgba(0, 242, 254, 0.3);
            font-family: 'Syncopate', sans-serif !important;
            font-size: 11px !important;
            padding: 16px 40px !important;
            border-radius: 20px !important;
            transition: 0.4s !important;
            letter-spacing: 2px;
        }
        .resend-btn-neon:hover {
            background: var(--aqua) !important;
            color: #000 !important;
            box-shadow: 0 0 30px var(--aqua);
        }
    </style>
</head>
<body>

    <div id="main-register-card" class="glass-card p-8 rounded-[35px] w-full max-w-md mx-4 relative z-10">
        <div class="text-center mb-8">
            <div class="w-12 h-12 bg-cyan-500 rounded-full mx-auto mb-4 shadow-[0_0_20px_#00f2fe]"></div>
            <h1 class="orbitron font-bold text-white">Synergy Protocol</h1>
            <p id="progress-text" class="orbitron text-cyan-400 mt-2" style="font-size: 8px;">Initialize Sequence: 0%</p>
        </div>

        <div id="form-content" class="space-y-4">
            <div><label class="orbitron text-gray-500 ml-1 mb-2 block">Full Name</label><input type="text" id="full-name" oninput="validateForm()" class="input-node"></div>
            <div id="step-email" class="hidden"><label class="orbitron text-gray-500 ml-1 mb-2 block">Email Address</label><input type="email" id="email" oninput="validateForm()" class="input-node"></div>
            <div id="step-user" class="hidden"><label class="orbitron text-gray-500 ml-1 mb-2 block">Username</label><input type="text" id="username" oninput="validateForm()" class="input-node"></div>
            <div id="step-state" class="hidden"><label class="orbitron text-gray-500 ml-1 mb-2 block">State</label><input type="text" id="state" oninput="validateForm()" class="input-node"></div>
            <div id="step-phone" class="hidden"><label class="orbitron text-gray-500 ml-1 mb-2 block">Phone Number</label><input type="tel" id="phone" oninput="validateForm()" class="input-node"></div>
            <button id="reg-btn" onclick="register()" disabled class="w-full bg-white text-black py-4 rounded-2xl font-bold orbitron mt-4 opacity-20 cursor-not-allowed transition-all duration-500">ACTIVATE PROTOCOL</button>
        </div>
    </div>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyDLTwLq8Le9vYAwRkRcqXPGxFnEqW1yE2E", authDomain: "synergy-protocol.firebaseapp.com", projectId: "synergy-protocol" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        function validateForm() {
            const fullName = document.getElementById('full-name').value.trim();
            const email = document.getElementById('email').value.trim();
            const user = document.getElementById('username').value.trim();
            const state = document.getElementById('state').value.trim();
            const phone = document.getElementById('phone').value.trim();
            const steps = [ { el: 'step-email', valid: fullName.split(' ').length >= 2 }, { el: 'step-user', valid: email.includes('@') && email.includes('.') }, { el: 'step-state', valid: user.length >= 3 }, { el: 'step-phone', valid: state.length >= 3 }, { el: 'reg-btn', valid: phone.length >= 10 } ];
            let completed = 0;
            steps.forEach(s => {
                const target = document.getElementById(s.el);
                if (s.valid) {
                    if (target.id === 'reg-btn') { target.disabled = false; target.style.opacity = "1"; }
                    else { target.classList.remove('hidden'); }
                    completed++;
                }
            });
            document.getElementById('progress-text').innerText = `Initialize Sequence: ${Math.round((completed/5)*100)}%`;
        }

        async function register() {
            const card = document.getElementById('main-register-card');
            const btn = document.getElementById('reg-btn');
            const email = document.getElementById('email').value.trim();
            const user = document.getElementById('username').value.toLowerCase().trim();
            
            btn.disabled = true;
            btn.innerText = "AUTHENTICATING...";

            try {
                const userRef = db.collection("users").doc(user);
                const doc = await userRef.get();
                if (doc.exists) { 
                    Swal.fire({ icon: 'error', title: 'NODE ERROR', text: 'Username active.', background: '#020617', color: '#fff' }); 
                    btn.disabled = false; btn.innerText = "ACTIVATE PROTOCOL"; return; 
                }

                const userCredential = await firebase.auth().createUserWithEmailAndPassword(email, "SynergyUser123");
                const fbUser = userCredential.user;
                await fbUser.sendEmailVerification();

                await userRef.set({
                    uid: fbUser.uid, fullName: document.getElementById('full-name').value.trim(), email, username: user,
                    state: document.getElementById('state').value.trim(), phoneNumber: document.getElementById('phone').value.trim(),
                    videoBalance: 0, shareBalance: 0, videosWatchedToday: 0, rank: "IRON", createdAt: firebase.firestore.FieldValue.serverTimestamp()
                });

                card.classList.add('fade-out');
                setTimeout(() => { card.style.display = 'none'; }, 500);

                // FEATURISTIC OVERLAY (WORLD-CLASS DESIGN)
                showSuccessOverlay(fbUser, email);

            } catch (e) {
                btn.disabled = false; btn.innerText = "RETRY ACTIVATION";
                Swal.fire({ icon: 'error', title: 'SYSTEM FAILURE', text: e.message });
            }
        }

        
        function showSuccessOverlay(fbUser, email) {
    Swal.fire({
        title: 'ACCESS PENDING',
        html: `
            <div style="text-align: left; background: rgba(255,255,255,0.03); padding: 20px; border-radius: 20px; border: 1px dashed rgba(0,242,254,0.3);">
                <div class="orbitron" style="font-size: 7px; color: #00f2fe; margin-bottom: 5px;">Target Node:</div>
                <div style="font-family: 'Roboto Mono'; font-size: 14px;">${email}</div>
                <div class="orbitron" style="font-size: 7px; color: #00f2fe; margin-top: 15px; margin-bottom: 5px;">Status:</div>
                <div style="font-size: 12px; color: #f87171;">AWAITING VERIFICATION...</div>
            </div>`,
        background: '#020617',
        showConfirmButton: true,
        confirmButtonText: 'RESEND LINK',
        allowOutsideClick: false,
        customClass: {
            popup: 'rounded-[30px] border-b-4 border-cyan-500 shadow-2xl',
            confirmButton: 'resend-btn-neon'
        }
    }).then(async (result) => {
        if (result.isConfirmed) {
            await fbUser.sendEmailVerification();
            showSuccessOverlay(fbUser, email);
        }
    });
        }
        
        
    </script>
</body>
</html>
