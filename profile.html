    <script>
        function toggleGoogleMenu(event) {
            event.stopPropagation();
            document.getElementById('google-nav').classList.toggle('active');
        }
        window.onclick = () => document.getElementById('google-nav').classList.remove('active');

        // Firebase Configuration
        const firebaseConfig = { 
            apiKey: "AIzaSyDLTwLq8Le9vYAwRkRcqXPGxFnEqW1yE2E", 
            authDomain: "synergy-protocol.firebaseapp.com", 
            projectId: "synergy-protocol", 
            storageBucket: "synergy-protocol.firebasestorage.app", 
            messagingSenderId: "179647543031", 
            appId: "1:179647543031:web:388da8a36e1bbbb55d85f2" 
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const testUser = "mamba_001";

        // Tabbatar mamba yana ciki (Auth Check)
firebase.auth().onAuthStateChanged((user) => {
    if (user) {
        console.log("Mamba ya shigo profile:", user.email);
        loadRealData(user.email);
    } else {
        window.location.href = "signin.html";
    }
});

function loadRealData(email) {
    // Nemo mamban ta hanyar Email dinsa
    db.collection("users").where("email", "==", email).onSnapshot((querySnapshot) => {
        if (!querySnapshot.empty) {
            querySnapshot.forEach((doc) => {
                const data = doc.data();
                
                // 1. Sanya Suna (Username)
                document.getElementById('display-username').innerText = `@${data.username || 'User'}`;
                
                // 2. Sanya Rank
                document.getElementById('user-rank').innerText = data.rank || "BRONZE";
                
                // 3. Sanya Ranar Shiga (Join Date)
                // Idan kana da field mai suna 'createdAt' a Firebase
                if (data.createdAt) {
                    const date = data.createdAt.toDate(); // Maida shi kwanan wata
                    const options = { month: 'short', year: 'numeric' };
                    document.getElementById('join-date').innerText = date.toLocaleDateString('en-US', options);
                } else {
                    document.getElementById('join-date').innerText = "Jan 2026";
                }

                // 4. Update Avatar (Idan akwai)
                if (data.profileImg) {
                    document.getElementById('user-img').src = data.profileImg;
                }
            });
        } else {
            console.error("Ba a samu bayanan wannan mamban ba");
        }
    });
}
