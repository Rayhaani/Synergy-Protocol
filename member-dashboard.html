<!DOCTYPE html>
<html lang="ha">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SYNERGY PROTOCOL | LIVE DATABASE</title>
    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@400;700&family=Space+Grotesk:wght@300;500;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <style>
        :root { --aqua: #00f2fe; --purple: #7000ff; --bg: #020617; }
        body { background: var(--bg); color: #fff; font-family: 'Space Grotesk', sans-serif; overflow-x: hidden; background-image: radial-gradient(circle at 50% 50%, rgba(112, 0, 255, 0.15), transparent), url('https://www.transparenttextures.com/patterns/carbon-fibre.png'); min-height: 100vh; }
        .glass-premium { background: rgba(255, 255, 255, 0.02); backdrop-filter: blur(40px) saturate(180%); border: 1px solid rgba(255, 255, 255, 0.08); border-top: 1px solid rgba(0, 242, 254, 0.3); }
        .orbitron { font-family: 'Syncopate', sans-serif; text-transform: uppercase; letter-spacing: 3px; }
        main { padding-bottom: 160px !important; }
        .floating-card-v3 { border-radius: 40px; box-shadow: 0 40px 100px -20px rgba(0, 0, 0, 0.9); transform: translateY(40px); opacity: 0; pointer-events: none; transition: all 1.2s cubic-bezier(0.19, 1, 0.22, 1); }
        .progress-ring-original { width: 115px; height: 115px; border-radius: 50%; background: conic-gradient(var(--aqua) 0%, #111 0%); display: flex; align-items: center; justify-content: center; margin: 20px auto; font-size: 22px; font-weight: 800; border: 4px solid rgba(255,255,255,0.05); box-shadow: 0 0 20px rgba(0, 242, 254, 0.2); color: var(--aqua); }
        #generated-code-display { font-size: 2.8rem; font-weight: 700; letter-spacing: 8px; color: white; text-align: center; display: block; }
        .node-input-clean { background: rgba(255, 255, 255, 0.03) !important; border: 1px solid rgba(255, 255, 255, 0.1) !important; border-radius: 20px !important; color: white !important; font-size: 1.4rem !important; text-align: center; padding: 18px !important; width: 100%; outline: none; }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
        .is-active-floating { animation: float 6s ease-in-out infinite; }
    
            .synergy-toast {
            position: fixed; top: -100px; left: 50%; transform: translateX(-50%);
            background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(15px);
            border: 1px solid var(--aqua); border-top: 3px solid var(--aqua);
            color: white; padding: 15px 30px; border-radius: 15px;
            z-index: 9999; transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex; align-items: center; gap: 12px;
            box-shadow: 0 10px 30px rgba(0, 242, 254, 0.2);
        }
        .synergy-toast.show { top: 30px; }
        .toast-icon { color: var(--aqua); font-weight: bold; font-size: 20px; }
                
    
    </style>
</head>
<body>
    <nav class="sticky top-0 z-50 glass-premium p-5 flex justify-between items-center px-8">
        <div class="orbitron text-[14px] text-cyan-400 font-bold tracking-[5px]">SYNERGY PROTOCOL</div>
        <div class="flex items-center gap-6">
            <div class="text-right"><p class="text-[10px] text-gray-400 uppercase tracking-widest">Vault Balance</p><p id="vault-balance" class="text-lg font-bold text-green-400 font-mono">₦0.00</p></div>
            <div class="w-10 h-10 rounded-full border border-cyan-500/30 p-1"><div class="w-full h-full bg-gradient-to-tr from-cyan-500 to-blue-600 rounded-full animate-pulse shadow-[0_0_15px_cyan]"></div></div>
        </div>
    </nav>

    <main class="max-w-2xl mx-auto p-6 mt-4 space-y-10">
        <section class="glass-premium rounded-[32px] overflow-hidden aspect-video relative">
            <div id="yt-player"></div>
            <div id="shutter" class="absolute inset-0 bg-black/90 flex flex-col items-center justify-center z-20">
                <button onclick="startQuantumSession()" class="w-20 h-20 glass-premium rounded-full flex items-center justify-center border border-white/10 group hover:border-cyan-500/50 transition-all"><svg class="fill-white group-hover:fill-cyan-400" width="28" height="28" viewBox="0 0 16 16"><path d="m11.596 8.697-6.363 3.692c-.54.313-1.233-.066-1.233-.697V4.308c0-.63.692-1.01 1.233-.696l6.363 3.692a.802.802 0 0 1 0 1.393z"/></svg></button>
                <p class="orbitron text-[10px] text-cyan-500/70 mt-5 tracking-[8px]">Initialize Session</p>
            </div>
        </section>
        <div class="progress-ring-original orbitron" id="ring">0%</div>

        <section class="grid grid-cols-3 gap-6">
            <div class="glass-premium p-6 rounded-[28px] text-center"><small class="text-[9px] text-gray-500 block mb-2">STABILITY</small><span class="text-sm font-bold text-cyan-400">99.9%</span></div>
            <div class="glass-premium p-6 rounded-[28px] text-center"><small class="text-[9px] text-gray-500 block mb-2">TIMER</small><span id="timer-display" class="text-sm font-bold text-white">00:00</span></div>
            <div class="glass-premium p-6 rounded-[28px] text-center"><small class="text-[9px] text-gray-500 block mb-2">YIELD</small><span class="text-sm font-bold text-green-400">+₦150</span></div>
        </section>

        <section id="verifier-panel" class="floating-card-v3 glass-premium p-10 relative">
            <div class="text-center space-y-8">
                <div><h2 class="orbitron text-[10px] text-white/40 mb-2">Security Hash Code</h2><div id="generated-code-display" class="orbitron">------</div></div>
                <div class="space-y-6">
                    <input type="text" id="node-code" maxlength="6" class="node-input-clean orbitron" placeholder="••••••">
                    <button onclick="authenticateNode()" class="w-full py-5 rounded-2xl bg-white text-black orbitron font-bold text-[12px] hover:bg-cyan-400 transition-all">Verify Transaction</button>
                </div>
            </div>
        </section>
    </main>

    <footer class="fixed bottom-8 left-10 right-10 h-20 glass-premium rounded-[35px] flex justify-around items-center z-[100]">
        <div class="flex flex-col items-center gap-1 group cursor-pointer"><div class="w-1.5 h-1.5 bg-cyan-400 rounded-full shadow-[0_0_15px_cyan]"></div><span class="text-[10px] font-bold text-cyan-400 orbitron">Core</span></div>
        <div class="text-gray-500 flex flex-col items-center gap-1 opacity-50"><span class="text-[10px] font-bold orbitron">Vault</span></div>
        <div class="text-gray-500 flex flex-col items-center gap-1 opacity-50"><span class="text-[10px] font-bold orbitron">Nodes</span></div>
        <div class="text-gray-500 flex flex-col items-center gap-1 opacity-50"><span class="text-[10px] font-bold orbitron">Meta</span></div>
    </footer>

    <script src="https://www.youtube.com/iframe_api"></script>
    <script>
        const firebaseConfig = { apiKey: "AIzaSyDLTwLq8Le9vYAwRkRcqXPGxFnEqW1yE2E", authDomain: "synergy-protocol.firebaseapp.com", projectId: "synergy-protocol", storageBucket: "synergy-protocol.firebasestorage.app", messagingSenderId: "179647543031", appId: "1:179647543031:web:388da8a36e1bbbb55d85f2" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const testUser = "mamba_001";

        function syncBalance() {
            db.collection("users").doc(testUser).onSnapshot((doc) => {
                if (doc.exists) { document.getElementById('vault-balance').innerText = "₦" + (doc.data().balance || 0).toLocaleString(); }
            });
        }
        syncBalance();

        let player, currentCode = "", lastTime = 0;
        function onYouTubeIframeAPIReady() { player = new YT.Player('yt-player', { height: '100%', width: '100%', videoId: 'dQw4w9WgXcQ', playerVars: { 'controls': 0, 'modestbranding': 1, 'rel': 0, 'disablekb': 1 }, events: { 'onStateChange': onPlayerStateChange } }); }
        function startQuantumSession() { document.getElementById('shutter').style.opacity = "0"; setTimeout(() => document.getElementById('shutter').style.display = "none", 1000); player.playVideo(); }

                
        let skipStrikes = 0; 
        
                function showSynergyAlert(msg, type = 'info') {
            let toast = document.getElementById('custom-toast');
            if(!toast) {
                toast = document.createElement('div');
                toast.id = 'custom-toast';
                toast.className = 'synergy-toast orbitron';
                toast.innerHTML = `<span class="toast-icon">!</span> <span style="font-size:10px; letter-spacing:1px;"></span>`;
                document.body.appendChild(toast);
            }
            
            // Canza kala dangane da nau'in sako (Type)
            if(type === 'success') toast.style.borderColor = '#4ade80'; // Kore
            else if(type === 'error') toast.style.borderColor = '#f87171'; // Ja
            else toast.style.borderColor = '#00f2fe'; // Cyan (Normal)

            toast.querySelector('span:last-child').innerText = msg;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 4000);
                }
        
                
        
        function onPlayerStateChange(event) {
            if (event.data === YT.PlayerState.PLAYING) {
                const securityTicker = setInterval(() => {
                    let currentTime = player.getCurrentTime();
                    let progress = Math.min(Math.floor((currentTime / player.getDuration()) * 100), 100);

                    // --- STRIKE SYSTEM ANTI-SKIP ---
                   
                    if (skipStrikes >= 3) {
    // ... code na kulle shafi ...
} else {
    showSynergyAlert("STRIKE " + skipStrikes + "/3: RESET", "error");
                    }
                    
                        skipStrikes++;
                        player.seekTo(0); 
                        lastTime = 0;

                        if (skipStrikes >= 3) {
                            document.body.innerHTML = "<div style='background:#020617; height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center; color:red; font-family:Syncopate; text-align:center; padding:20px;'><h1>PROTOCOL BREACH</h1><p style='color:white; margin-top:20px;'>Your access has been suspended for multiple fraud attempts. <br> Please refresh and follow the rules.</p></div>";
                            clearInterval(securityTicker);
                        } else {
                            alert("WARNING (" + skipStrikes + "/3): Skip detected. Resetting to 0%. Attempt 3 will lock the session.");
                        }
                    } else {
                        lastTime = currentTime; 
                    }

                    document.getElementById("ring").innerText = progress + "%";
                    document.getElementById("ring").style.background = `conic-gradient(var(--aqua) ${progress * 3.6}deg, #111 0deg)`;
                    
                    let mins = Math.floor(currentTime / 60), secs = Math.floor(currentTime % 60);
                    document.getElementById('timer-display').innerText = `${mins < 10 ? '0'+mins : mins}:${secs < 10 ? '0'+secs : secs}`;

                    if (progress >= 90) { // Na mayar da shi 90% yanzu tunda mun gama gwaji
                        const p = document.getElementById('verifier-panel'); 
                        p.style.opacity = "1"; 
                        p.style.transform = "translateY(0)"; 
                        p.style.pointerEvents = "all"; 
                        p.classList.add('is-active-floating');
                        if(currentCode === "") generateCode();
                    }
                }, 1000);
            }
                            }

        
        function generateCode() { currentCode = Math.random().toString(36).substring(2,8).toUpperCase(); document.getElementById("generated-code-display").innerText = currentCode; }

        async function authenticateNode() {
            const inputVal = document.getElementById('node-code').value.toUpperCase();
            if(inputVal === currentCode) {
                const userRef = db.collection("users").doc(testUser);
                await userRef.set({ balance: firebase.firestore.FieldValue.increment(150) }, { merge: true });
                showSynergyAlert("SUCCESS: ₦150 EARNED", "success");
setTimeout(() => location.reload(), 2000);
                
          } else { 
    showSynergyAlert("ERROR: CODE MISMATCH", "error"); 
            }
            

        // --- TAB SWITCHING PROTECTION (Visibility API) ---
document.addEventListener("visibilitychange", function() {
    if (document.hidden) {
        // Idan mamba ya bar shafin, tsayar da bidiyon
        if (player && player.pauseVideo) {
            player.pauseVideo();
            console.log("Session Paused: User left the tab.");
        }
    } else {
        // Idan ya dawo, zai iya ci gaba da kallo daga inda ya tsaya
        console.log("Session Resumed: User returned to tab.");
    }
});
        
    </script>
</body>
</html>
