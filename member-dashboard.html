<!DOCTYPE html>
<html lang="ha">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SYNERGY PROTOCOL | PRESTIGE UI</title>
    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@400;700&family=Space+Grotesk:wght@300;500;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --aqua: #00f2fe;
            --purple: #7000ff;
            --bg: #020617;
        }

        body {
            background: var(--bg);
            color: #fff;
            font-family: 'Space Grotesk', sans-serif;
            overflow-x: hidden;
            background-image: 
                radial-gradient(circle at 50% 50%, rgba(112, 0, 255, 0.15), transparent),
                url('https://www.transparenttextures.com/patterns/carbon-fibre.png');
            min-height: 100vh;
        }

        .glass-premium {
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(40px) saturate(180%);
            -webkit-backdrop-filter: blur(40px) saturate(180%);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-top: 1px solid rgba(0, 242, 254, 0.3);
        }

        .orbitron { font-family: 'Syncopate', sans-serif; text-transform: uppercase; letter-spacing: 3px; }

        /* Saka wannan kafin .floating-card-v3 */
main { 
    padding-bottom: 150px !important; 
}
        
        .floating-card-v3 {
            border-radius: 40px;
            box-shadow: 0 40px 100px -20px rgba(0, 0, 0, 0.9);
            transform: translateY(40px);
            opacity: 0;
            pointer-events: none;
            transition: all 1.2s cubic-bezier(0.19, 1, 0.22, 1);
        }

        /* DAWO DA ASALIN CIRCLE RING MAI KYAU */
        .progress-ring-original {
            width: 115px; height: 115px;
            border-radius: 50%;
            background: conic-gradient(var(--aqua) 0%, #111 0%);
            display: flex; align-items: center; justify-content: center;
            margin: 20px auto;
            font-size: 22px;
            font-weight: 800;
            border: 4px solid rgba(255,255,255,0.05);
            box-shadow: 0 0 20px rgba(0, 242, 254, 0.2);
            color: var(--aqua);
        }

        /* RAGE GIRMAN SECURITY CODE */
        #generated-code-display {
            font-size: 2.8rem; /* An rage daga 5rem don kar ya yanke */
            font-weight: 700;
            tracking: 8px;
            color: white;
            text-align: center;
            display: block;
            width: 100%;
        }

        .node-input-clean {
            background: rgba(255, 255, 255, 0.03) !important;
            border: 1px solid rgba(255, 255, 255, 0.1) !important;
            border-radius: 20px !important;
            color: white !important;
            font-size: 1.4rem !important;
            text-align: center;
            padding: 18px !important;
            width: 100%;
            outline: none;
            transition: border-color 0.3s;
        }
        .node-input-clean:focus { border-color: var(--aqua) !important; }

        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
        .is-active-floating { animation: float 6s ease-in-out infinite; }
    </style>
</head>
<body>

    <nav class="sticky top-0 z-50 glass-premium p-5 flex justify-between items-center px-8">
        <div class="orbitron text-[14px] text-cyan-400 font-bold tracking-[5px]">SYNERGY PROTOCOL</div>
        <div class="flex items-center gap-6">
            <div class="text-right">
                <p class="text-[10px] text-gray-400 uppercase tracking-widest">Vault Balance</p>
                <p class="text-lg font-bold text-green-400 font-mono">₦45,890.00</p>
            </div>
            <div class="w-10 h-10 rounded-full border border-cyan-500/30 p-1">
                <div class="w-full h-full bg-gradient-to-tr from-cyan-500 to-blue-600 rounded-full animate-pulse shadow-[0_0_15px_cyan]"></div>
            </div>
        </div>
    </nav>

    <main class="max-w-2xl mx-auto p-6 mt-4 space-y-10">

        <section class="relative group">
            <div class="absolute -inset-1 bg-gradient-to-r from-cyan-500 to-purple-600 rounded-[32px] blur opacity-10 group-hover:opacity-20 transition"></div>
            <div id="video-frame" class="glass-premium rounded-[32px] overflow-hidden aspect-video relative">
                <div id="yt-player"></div>
                <div id="shutter" class="absolute inset-0 bg-black/90 flex flex-col items-center justify-center z-20 transition-all duration-1000">
                    <button onclick="startQuantumSession()" class="w-20 h-20 glass-premium rounded-full flex items-center justify-center border border-white/10 group hover:border-cyan-500/50 transition-all">
                        <svg class="fill-white group-hover:fill-cyan-400 transition" width="28" height="28" viewBox="0 0 16 16"><path d="m11.596 8.697-6.363 3.692c-.54.313-1.233-.066-1.233-.697V4.308c0-.63.692-1.01 1.233-.696l6.363 3.692a.802.802 0 0 1 0 1.393z"/></svg>
                    </button>
                    <p class="orbitron text-[10px] text-cyan-500/70 mt-5 tracking-[8px]">Initialize Session</p>
                </div>
            </div>
        </section>

        <div class="progress-ring-original orbitron" id="ring">0%</div>

        <section class="grid grid-cols-3 gap-6">
            <div class="glass-premium p-6 rounded-[28px] text-center border-b-2 border-cyan-500/20">
                <small class="text-[9px] text-gray-500 block mb-2 uppercase tracking-tighter">Node Stability</small>
                <span class="text-sm font-bold text-cyan-400">99.98%</span>
            </div>
            <div class="glass-premium p-6 rounded-[28px] text-center">
                <small class="text-[9px] text-gray-500 block mb-2 uppercase tracking-tighter">Verification</small>
                <span id="timer-display" class="text-sm font-bold text-white">00:00</span>
            </div>
            <div class="glass-premium p-6 rounded-[28px] text-center border-b-2 border-green-500/20">
                <small class="text-[9px] text-gray-500 block mb-2 uppercase tracking-tighter">Current Yield</small>
                <span class="text-sm font-bold text-green-400">+₦150</span>
            </div>
        </section>

        <section id="verifier-panel" class="floating-card-v3 glass-premium p-10 relative">
            <div class="text-center space-y-8">
                <div>
                    <h2 class="orbitron text-[10px] text-white/40 tracking-[5px] mb-2">Security Hash Code</h2>
                    <div id="generated-code-display" class="orbitron">------</div>
                </div>
                
                <div class="space-y-6">
                    <input type="text" id="node-code" maxlength="6" 
                        class="node-input-clean orbitron" 
                        placeholder="••••••">

                    <button onclick="authenticateNode()" 
                        class="w-full py-5 rounded-2xl bg-white text-black orbitron font-bold text-[12px] hover:bg-cyan-400 transition-all duration-500 shadow-xl shadow-white/5">
                        Verify Transaction
                    </button>
                </div>
            </div>
        </section>

    </main>

    <footer class="fixed bottom-8 left-10 right-10 h-20 glass-premium rounded-[35px] flex justify-around items-center border border-white/10 z-[100]">
        <div class="flex flex-col items-center gap-1 group cursor-pointer">
            <div class="w-1.5 h-1.5 bg-cyan-400 rounded-full shadow-[0_0_15px_cyan]"></div>
            <span class="text-[10px] font-bold text-cyan-400 orbitron">Core</span>
        </div>
        <div class="text-gray-500 flex flex-col items-center gap-1 opacity-50"><span class="text-[10px] font-bold orbitron">Vault</span></div>
        <div class="text-gray-500 flex flex-col items-center gap-1 opacity-50"><span class="text-[10px] font-bold orbitron">Nodes</span></div>
        <div class="text-gray-500 flex flex-col items-center gap-1 opacity-50"><span class="text-[10px] font-bold orbitron">Meta</span></div>
    </footer>

    <script src="https://www.youtube.com/iframe_api"></script>
    <script>
        let player;
        let currentCode = "";
        
        function onYouTubeIframeAPIReady() {
            player = new YT.Player('yt-player', {
                height: '100%', width: '100%', videoId: 'dQw4w9WgXcQ',
                playerVars: { 'controls': 0, 'modestbranding': 1, 'rel': 0 },
                events: { 'onStateChange': onPlayerStateChange }
            });
        }

        function startQuantumSession() {
            document.getElementById('shutter').style.transform = "scale(1.2)";
            document.getElementById('shutter').style.opacity = "0";
            setTimeout(() => document.getElementById('shutter').style.display = "none", 1000);
            player.playVideo();
        }

        function onPlayerStateChange(event) {
            if (event.data === YT.PlayerState.PLAYING) {
                const ring = document.getElementById("ring");
                const ticker = setInterval(() => {
                    let progress = Math.min(Math.floor((player.getCurrentTime() / player.getDuration()) * 100), 100);
                    
                    // Update Original Ring
                    ring.innerText = progress + "%";
                    ring.style.background = `conic-gradient(var(--aqua) ${progress * 3.6}deg, #111 0deg)`;

                    let mins = Math.floor(player.getCurrentTime() / 60);
                    let secs = Math.floor(player.getCurrentTime() % 60);
                    document.getElementById('timer-display').innerText = `${mins < 10 ? '0'+mins : mins}:${secs < 10 ? '0'+secs : secs}`;

                    if (progress >= 5) {
                        const panel = document.getElementById('verifier-panel');
                        panel.style.opacity = "1";
                        panel.style.transform = "translateY(0)";
                        panel.style.pointerEvents = "all";
                        panel.classList.add('is-active-floating');
                        if(currentCode === "") generateCode();
                    }
                }, 1000);
            }
        }

        function generateCode() {
            currentCode = Math.random().toString(36).substring(2,8).toUpperCase();
            document.getElementById("generated-code-display").innerText = currentCode;
        }

        function authenticateNode() {
            if(document.getElementById('node-code').value.toUpperCase() === currentCode) {
                alert("NODE_VERIFIED: Reward sequence initiated.");
                location.reload();
            } else {
                alert("AUTH_ERROR: Sequence mismatched.");
            }
        }
    </script>
</body>
                </html>
