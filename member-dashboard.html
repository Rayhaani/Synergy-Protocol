<!DOCTYPE html>
<html lang="ha">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NASARA PLATINUM | QUANTUM-NODE</title>
    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@400;700&family=Space+Grotesk:wght@300;500;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --aqua: #00f2fe;
            --purple: #7000ff;
            --bg: #020617;
        }

        body {
            background: var(--bg);
            color: #fff;
            font-family: 'Space Grotesk', sans-serif;
            overflow-x: hidden;
            background-image: 
                linear-gradient(to bottom, rgba(2, 6, 23, 0.8), rgba(2, 6, 23, 0.9)),
                url('https://www.transparenttextures.com/patterns/carbon-fibre.png');
        }

        .glass {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.8);
        }

        .neon-glow {
            box-shadow: 0 0 20px rgba(0, 242, 254, 0.4);
            border: 1px solid var(--aqua);
        }

        .orbitron { font-family: 'Syncopate', sans-serif; text-transform: uppercase; letter-spacing: 4px; }

        /* Animated Background Pulse */
        @keyframes pulse {
            0% { transform: scale(1); opacity: 0.3; }
            50% { transform: scale(1.2); opacity: 0.5; }
            100% { transform: scale(1); opacity: 0.3; }
        }
        .bg-pulse {
            position: fixed; top: -50%; left: -50%; width: 200%; height: 200%;
            background: radial-gradient(circle, var(--purple) 0%, transparent 40%);
            animation: pulse 10s infinite; z-index: -1;
        }

        .matrix-text {
            text-shadow: 0 0 5px var(--aqua);
            font-weight: bold;
        }

        input::placeholder { color: rgba(0, 242, 254, 0.3); }
    </style>
</head>
<body>

    <div class="bg-pulse"></div>

    <nav class="sticky top-0 z-50 glass border-b border-white/10 p-4 flex justify-between items-center">
        <div class="orbitron text-[12px] text-cyan-400 font-bold">Nasara <span class="text-white">Platinum</span></div>
        <div class="flex items-center gap-4">
            <div class="text-right">
                <p class="text-[9px] text-gray-400 uppercase">Vault Balance</p>
                <p class="text-sm font-bold text-green-400">₦45,890.00</p>
            </div>
            <div class="w-8 h-8 rounded-full border-2 border-cyan-500 p-1">
                <div class="w-full h-full bg-cyan-500 rounded-full animate-pulse"></div>
            </div>
        </div>
    </nav>

    <main class="max-w-xl mx-auto p-6 space-y-8">

        <section class="relative">
            <div id="video-frame" class="glass rounded-3xl overflow-hidden neon-glow aspect-video relative">
                <div id="yt-player"></div>
                <div id="shutter" class="absolute inset-0 bg-black flex flex-col items-center justify-center z-20 transition-all duration-1000">
                    <div class="mb-6 relative">
                        <div class="absolute inset-0 bg-cyan-500 blur-2xl opacity-20 animate-ping"></div>
                        <button onclick="startQuantumSession()" class="relative z-10 w-20 h-20 glass rounded-full flex items-center justify-center border border-cyan-500/50 group">
                            <svg class="fill-cyan-400 group-hover:scale-125 transition" width="30" height="30" viewBox="0 0 16 16"><path d="m11.596 8.697-6.363 3.692c-.54.313-1.233-.066-1.233-.697V4.308c0-.63.692-1.01 1.233-.696l6.363 3.692a.802.802 0 0 1 0 1.393z"/></svg>
                        </button>
                    </div>
                    <p class="orbitron text-[10px] text-cyan-500 tracking-[8px]">Initialize Node</p>
                </div>
            </div>
        </section>

        <section class="grid grid-cols-3 gap-4">
            <div class="glass p-4 rounded-2xl text-center">
                <small class="text-[9px] text-gray-500 block mb-1">STABILITY</small>
                <span class="text-xs font-bold text-cyan-400">99.9%</span>
            </div>
            <div class="glass p-4 rounded-2xl text-center border-x border-white/5">
                <small class="text-[9px] text-gray-500 block mb-1">WATCH TIME</small>
                <span id="timer-display" class="text-xs font-bold text-white">00:00</span>
            </div>
            <div class="glass p-4 rounded-2xl text-center">
                <small class="text-[9px] text-gray-500 block mb-1">REWARD</small>
                <span class="text-xs font-bold text-green-400">+₦150</span>
            </div>
        </section>

        <section id="verifier-panel" class="opacity-10 pointer-events-none transition-all duration-1000">
            <div class="glass p-8 rounded-[40px] border-t border-cyan-500/30 text-center relative overflow-hidden">
                <div class="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-transparent via-cyan-500 to-transparent shadow-[0_0_15px_cyan]"></div>
                
                <h2 class="orbitron text-xs mb-6 text-white/80">Input Verification Matrix</h2>
                
                <div class="relative inline-block w-full">
                    <input type="text" id="node-code" maxlength="4" class="w-full bg-transparent border-b-2 border-white/10 py-4 text-center text-4xl font-light tracking-[20px] outline-none focus:border-cyan-500 transition-all text-cyan-400 orbitron" placeholder="0000">
                </div>

                <button onclick="finalizeNode()" class="w-full mt-8 py-5 rounded-2xl bg-cyan-500 text-black orbitron font-bold text-[11px] hover:bg-white transition-all shadow-[0_20px_40px_rgba(0,242,254,0.2)]">
                    Sync to Blockchain
                </button>
            </div>
        </section>

    </main>

    <nav class="fixed bottom-6 left-6 right-6 h-20 glass rounded-[30px] flex justify-around items-center border border-white/10">
        <div class="text-cyan-400 flex flex-col items-center gap-1">
            <div class="w-1 h-1 bg-cyan-400 rounded-full shadow-[0_0_10px_cyan]"></div>
            <span class="text-[10px] font-bold">CORE</span>
        </div>
        <div class="text-gray-600 flex flex-col items-center gap-1"><span class="text-[10px] font-bold">WALLET</span></div>
        <div class="text-gray-600 flex flex-col items-center gap-1"><span class="text-[10px] font-bold">MINING</span></div>
        <div class="text-gray-600 flex flex-col items-center gap-1"><span class="text-[10px] font-bold">USER</span></div>
    </nav>

    <script src="https://www.youtube.com/iframe_api"></script>
    <script>
        let player;
        let isActive = false;
        
        function onYouTubeIframeAPIReady() {
            player = new YT.Player('yt-player', {
                height: '100%', width: '100%',
                videoId: 'dQw4w9WgXcQ',
                playerVars: { 'controls': 0, 'disablekb': 1, 'modestbranding': 1, 'rel': 0 },
                events: { 'onStateChange': onPlayerStateChange }
            });
        }

        function startQuantumSession() {
            document.getElementById('shutter').style.transform = "translateY(-100%)";
            player.playVideo();
            isActive = true;
        }

        function onPlayerStateChange(event) {
            if (event.data === YT.PlayerState.PLAYING) {
                trackNode();
            }
        }

        function trackNode() {
            const monitor = setInterval(() => {
                let current = player.getCurrentTime();
                let duration = player.getDuration();
                let progress = (current / duration) * 100;
                
                // Update Timer
                let mins = Math.floor(current / 60);
                let secs = Math.floor(current % 60);
                document.getElementById('timer-display').innerText = `${mins < 10 ? '0'+mins : mins}:${secs < 10 ? '0'+secs : secs}`;

                if (progress >= 90) {
                    document.getElementById('verifier-panel').style.opacity = "1";
                    document.getElementById('verifier-panel').style.pointerEvents = "all";
                    clearInterval(monitor);
                }
            }, 1000);
        }

        function finalizeNode() {
            const code = document.getElementById('node-code').value;
            if(code === "2026") {
                alert("QUANTUM_SYNC_COMPLETE: Reward Processed.");
                window.location.reload();
            } else {
                alert("AUTH_FAILED: Invalid Encryption Key.");
            }
        }

        // Anti-Cheat: Screen Visibility
        document.addEventListener("visibilitychange", () => {
            if (document.hidden && isActive) {
                player.pauseVideo();
                document.body.style.filter = "grayscale(1) blur(10px)";
                setTimeout(() => { alert("PROTOCOL_BREACH: Session Aborted."); location.reload(); }, 500);
            }
        });
    </script>
</body>
</html>
