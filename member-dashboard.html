<!DOCTYPE html>
<html lang="ha">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SYNERGY PROTOCOL | QUANTUM-NODE</title>
    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@400;700&family=Space+Grotesk:wght@300;500;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --aqua: #00f2fe;
            --purple: #7000ff;
            --bg: #020617;
        }

        body {
            background: var(--bg);
            color: #fff;
            font-family: 'Space Grotesk', sans-serif;
            overflow-x: hidden;
            background-image: 
                linear-gradient(to bottom, rgba(2, 6, 23, 0.8), rgba(2, 6, 23, 0.9)),
                url('https://www.transparenttextures.com/patterns/carbon-fibre.png');
            min-height: 100vh;
        }

        .glass {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5);
        }

        .orbitron { font-family: 'Syncopate', sans-serif; text-transform: uppercase; letter-spacing: 4px; }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 0.3; }
            50% { transform: scale(1.2); opacity: 0.5; }
            100% { transform: scale(1); opacity: 0.3; }
        }
        .bg-pulse {
            position: fixed; top: -50%; left: -50%; width: 200%; height: 200%;
            background: radial-gradient(circle, var(--purple) 0%, transparent 40%);
            animation: pulse 10s infinite; z-index: -1;
        }

        main { padding-bottom: 220px !important; }

        /* FEATURE: Progress Ring Style */
        .progress-ring {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: conic-gradient(var(--aqua) 0%, #111 0%);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 20px auto;
            font-size: 18px;
            font-weight: bold;
            border: 4px solid rgba(255,255,255,0.05);
            box-shadow: 0 0 20px rgba(0, 242, 254, 0.2);
        }

        .node-input-field {
            background: rgba(0, 242, 254, 0.07) !important;
            border: 2px solid rgba(0, 242, 254, 0.4) !important;
            border-radius: 20px !important;
            color: white !important;
        }

        .floating-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(0, 242, 254, 0.3);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.8);
            transform: translateY(30px);
            opacity: 0;
            pointer-events: none;
            transition: all 0.8s ease;
        }
    </style>
</head>
<body>

    <div class="bg-pulse"></div>

    <nav class="sticky top-0 z-50 glass border-b border-white/10 p-4 flex justify-between items-center">
        <div class="orbitron text-[12px] text-cyan-400 font-bold">SYNERGY <span class="text-white">PROTOCOL</span></div>
        <div class="flex items-center gap-4">
            <div class="text-right">
                <p class="text-[9px] text-gray-400 uppercase">Vault Balance</p>
                <p class="text-sm font-bold text-green-400">₦45,890.00</p>
            </div>
            <div class="w-8 h-8 rounded-full border-2 border-cyan-500 p-1">
                <div class="w-full h-full bg-cyan-500 rounded-full animate-pulse"></div>
            </div>
        </div>
    </nav>

    <main class="max-w-xl mx-auto p-6 space-y-8">

        <section class="relative">
            <div id="video-frame" class="glass rounded-3xl overflow-hidden aspect-video relative">
                <div id="yt-player"></div>
                <div id="shutter" class="absolute inset-0 bg-black flex flex-col items-center justify-center z-20 transition-all duration-1000">
                    <button onclick="startQuantumSession()" class="w-20 h-20 glass rounded-full flex items-center justify-center border border-cyan-500/50 group">
                        <svg class="fill-cyan-400 group-hover:scale-125 transition" width="30" height="30" viewBox="0 0 16 16"><path d="m11.596 8.697-6.363 3.692c-.54.313-1.233-.066-1.233-.697V4.308c0-.63.692-1.01 1.233-.696l6.363 3.692a.802.802 0 0 1 0 1.393z"/></svg>
                    </button>
                    <p class="orbitron text-[10px] text-cyan-500 mt-4 tracking-[8px]">Initialize Node</p>
                </div>
            </div>
        </section>

        <div class="progress-ring orbitron" id="ring">0%</div>

        <section class="grid grid-cols-3 gap-4">
            <div class="glass p-4 rounded-2xl text-center">
                <small class="text-[9px] text-gray-500 block mb-1 uppercase">Stability</small>
                <span class="text-xs font-bold text-cyan-400">99.9%</span>
            </div>
            <div class="glass p-4 rounded-2xl text-center border-x border-white/5">
                <small class="text-[9px] text-gray-500 block mb-1 uppercase">Watch Time</small>
                <span id="timer-display" class="text-xs font-bold text-white">00:00</span>
            </div>
            <div class="glass p-4 rounded-2xl text-center">
                <small class="text-[9px] text-gray-500 block mb-1 uppercase">Reward</small>
                <span class="text-xs font-bold text-green-400">+₦150</span>
            </div>
        </section>

        <section id="verifier-panel" class="floating-card p-8 rounded-[40px] text-center relative overflow-hidden">
            <div class="absolute top-0 left-0 w-full h-[2px] bg-gradient-to-r from-transparent via-cyan-400 to-transparent"></div>
            
            <h2 class="orbitron text-[10px] mb-4 text-white/70 tracking-[2px]">Verification Code:</h2>
            <div id="generated-code-display" class="text-3xl font-bold text-cyan-400 mb-6 orbitron tracking-[5px]">------</div>
            
            <div class="relative w-full mb-8">
                <input type="text" id="node-code" maxlength="6" 
                    class="node-input-field w-full py-5 text-center text-4xl font-light tracking-[10px] outline-none transition-all orbitron" 
                    placeholder="ENTER CODE">
            </div>

            <button onclick="authenticateNode()" 
                class="w-full py-5 rounded-2xl bg-cyan-500 text-black orbitron font-bold text-[11px] hover:bg-white transition-all shadow-[0_15px_40px_rgba(0,242,254,0.3)]">
                Authenticate Node
            </button>
        </section>

    </main>

    <nav class="fixed bottom-6 left-6 right-6 h-20 glass rounded-[30px] flex justify-around items-center border border-white/10 z-[100]">
        <div class="text-cyan-400 flex flex-col items-center gap-1">
            <div class="w-1 h-1 bg-cyan-400 rounded-full shadow-[0_0_10px_cyan]"></div>
            <span class="text-[10px] font-bold">CORE</span>
        </div>
        <div class="text-gray-600 flex flex-col items-center gap-1"><span class="text-[10px] font-bold">WALLET</span></div>
        <div class="text-gray-600 flex flex-col items-center gap-1"><span class="text-[10px] font-bold">MINING</span></div>
        <div class="text-gray-600 flex flex-col items-center gap-1"><span class="text-[10px] font-bold">USER</span></div>
    </nav>

    <script src="https://www.youtube.com/iframe_api"></script>
    <script>
        let player;
        let progress = 0;
        let currentGeneratedCode = "";
        
        function onYouTubeIframeAPIReady() {
            player = new YT.Player('yt-player', {
                height: '100%', width: '100%',
                videoId: 'dQw4w9WgXcQ',
                playerVars: { 'controls': 0, 'disablekb': 1, 'modestbranding': 1, 'rel': 0 },
                events: { 'onStateChange': onPlayerStateChange }
            });
        }

        function startQuantumSession() {
            document.getElementById('shutter').style.transform = "translateY(-100%)";
            player.playVideo();
        }

        function onPlayerStateChange(event) {
            if (event.data === YT.PlayerState.PLAYING) {
                trackNode();
            }
        }

        function trackNode() {
            const ring = document.getElementById("ring");
            const timer = setInterval(() => {
                if(player.getPlayerState() !== YT.PlayerState.PLAYING) return;
                
                let current = player.getCurrentTime();
                let duration = player.getDuration();
                
                // Progress algorithm (0 to 90%)
                let rawProgress = (current / duration) * 100;
                progress = Math.min(Math.floor(rawProgress), 90);
                
                // Update Circle
                ring.innerText = progress + "%";
                ring.style.background = `conic-gradient(var(--aqua) ${progress * 4}deg, #111 0deg)`;

                // Update Timer
                let mins = Math.floor(current / 60);
                let secs = Math.floor(current % 60);
                document.getElementById('timer-display').innerText = `${mins < 10 ? '0'+mins : mins}:${secs < 10 ? '0'+secs : secs}`;

                // Trigger 90%
                if (progress >= 90) {
                    const panel = document.getElementById('verifier-panel');
                    panel.style.opacity = "1";
                    panel.style.transform = "translateY(0)";
                    panel.style.pointerEvents = "all";
                    
                    if(currentGeneratedCode === "") generateVerificationCode();
                    clearInterval(timer);
                }
            }, 1000);
        }

        function generateVerificationCode() {
            currentGeneratedCode = Math.random().toString(36).substring(2,8).toUpperCase();
            document.getElementById("generated-code-display").innerText = currentGeneratedCode;
        }

        function authenticateNode() {
            const input = document.getElementById('node-code').value.toUpperCase();
            if(input === currentGeneratedCode && currentGeneratedCode !== "") {
                alert("SYNERGY_AUTH_SUCCESS: Node Verified.");
                window.location.reload();
            } else {
                alert("ACCESS_DENIED: Invalid Verification Code.");
            }
        }
    </script>
</body>
    </html>
