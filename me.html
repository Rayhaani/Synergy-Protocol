<!DOCTYPE html>
<html lang="ha">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SYNERGY | FACEBOOK STYLE V13</title>
    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@400;700&family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --neon: #00f2fe; --glow: rgba(0, 242, 254, 0.4); --bg: #050505; }
        body { 
            background: var(--bg); color: #fff; font-family: 'Plus Jakarta Sans', sans-serif;
            background-image: radial-gradient(circle at 90% 10%, rgba(112, 0, 255, 0.08), transparent 40%);
            min-height: 100vh; overflow-x: hidden;
        }

        /* 1. COVER PHOTO SECTION */
        .cover-wrapper {
            width: 100%;
            height: 220px;
            position: absolute;
            top: 0; left: 0;
            z-index: 10;
            overflow: hidden;
        }
        .cover-photo {
            width: 100%; height: 100%;
            object-fit: cover;
            opacity: 0.7; /* Hasken hoton cover */
            background: linear-gradient(to bottom, transparent, var(--bg));
        }

        /* KYAMARAR COVER - Tana saman komai yanzu */
        .camera-cover-main {
            position: absolute;
            top: 120px; 
            right: 20px;
            width: 40px; height: 40px;
            background: #e4e6eb;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            z-index: 100;
            border: 3px solid var(--bg);
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        /* 2. MAIN CONTAINER */
        .profile-content {
            position: relative;
            z-index: 20;
            margin-top: 140px; /* Ya jawo komai sama ya hau kan cover */
        }

        .glass-vault {
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(40px);
            border-radius: 40px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            padding: 25px;
            position: relative;
            box-shadow: 0 30px 60px rgba(0,0,0,0.8);
        }

        .avatar-container {
            position: absolute;
            top: -50px;
            left: 25px;
            z-index: 50;
        }
        .avatar-circle {
            width: 100px; height: 100px;
            border-radius: 35px;
            padding: 4px;
            background: linear-gradient(135deg, var(--neon), #7000ff);
            box-shadow: 0 10px 30px var(--glow);
            position: relative;
        }
        .avatar-circle img { width: 100%; height: 100%; border-radius: 31px; object-fit: cover; border: 3px solid var(--bg); }

        /* KYAMARAR PROFILE */
        .camera-profile-main {
            position: absolute;
            bottom: -2px; right: -2px;
            width: 32px; height: 32px;
            background: #e4e6eb;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            border: 3px solid var(--bg);
            z-index: 60;
        }

        /* SLIM BUTTONS */
        .btn-slim {
            flex: 1; font-family: 'Syncopate', sans-serif; font-size: 8px; font-weight: 700;
            padding: 10px 0; border-radius: 12px; text-transform: uppercase; letter-spacing: 1.5px; text-align: center;
        }
        .btn-black { background: #000; color: #fff; border: 1px solid rgba(255,255,255,0.1); }
        .btn-white { background: #fff; color: #000; }
        .btn-trans { background: transparent; color: #fff; border: 1px solid rgba(255,255,255,0.1); }

        .smart-box-highlights {
            background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(0, 242, 254, 0.15);
            border-radius: 24px; padding: 15px; margin-top: 20px;
        }

        .highlights-scroll { display: flex; gap: 15px; overflow-x: auto; scrollbar-width: none; }
        .highlight-item { text-align: center; min-width: 65px; }
        .highlight-ring { width: 60px; height: 60px; border-radius: 20px; border: 1.5px solid rgba(255, 255, 255, 0.1); display: flex; align-items: center; justify-content: center; }
        .highlight-ring img { width: 100%; height: 100%; border-radius: 16px; object-fit: cover; }
        .highlight-label { font-size: 8px; font-family: 'Syncopate'; margin-top: 6px; color: #666; font-weight: 700; }

        /* GRID WITH GLOW */
        .insta-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        .grid-item { 
            aspect-ratio: 1/1; border-radius: 20px; overflow: hidden; background: #111;
            border: 1px solid rgba(0, 242, 254, 0.1); box-shadow: 0 4px 15px rgba(0, 242, 254, 0.05);
        }
        .grid-item img { width: 100%; height: 100%; object-fit: cover; }
   
    
    </style>
</head>
<body class="p-4">

    <!-- COVER PHOTO -->
    <div class="cover-wrapper">
        <img src="https://images.unsplash.com/photo-1614850523296-d8c1af93d400?w=1200" class="cover-photo" alt="Cover">
    </div>

    <!-- KYAMARAR COVER (A FILI A SAMA) -->
    <div class="camera-cover-main">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#000" stroke-width="2.5"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"></path><circle cx="12" cy="13" r="4"></circle></svg>
    </div>

    <main class="max-w-2xl mx-auto profile-content">
        
        <div class="relative">
            <!-- AVATAR TARE DA KYAMARA -->
            <div class="avatar-container">
                <div class="avatar-circle">
                    <img src="https://api.dicebear.com/7.x/bottts/svg?seed=mamba" alt="Profile">
                    <div class="camera-profile-main">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#000" stroke-width="3"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"></path><circle cx="12" cy="13" r="4"></circle></svg>
                    </div>
                </div>
            </div>

            <!-- GLASS VAULT BOX -->
            <div class="glass-vault">
                <div class="flex flex-col ml-28">
                    <div class="flex items-center gap-2 mb-2" style="margin-top: -5px;">
                        <h1 class="text-[17px] font-extrabold text-white tracking-tight">Aliyu Haedar</h1>
                        <div class="w-4 h-4 bg-cyan-400 rounded-lg flex items-center justify-center">
                            <svg width="10" height="10" fill="none" stroke="black" stroke-width="4" viewBox="0 0 24 24"><path d="M5 13l4 4L19 7"></path></svg>
                        </div>
                    </div>
                </div>

                <div class="mt-4 pt-2">
                    <p class="text-gray-400 text-[11px] leading-relaxed max-w-sm mb-4">
                        <span class="text-white font-bold">Global Trust Authority</span> | <span class="text-cyan-400">@SynergyProtocol</span><br>
                        Crafting the largest Wholesale Directory in Kano. 
                        Wholesaler of Luxury Sudanese Toubs & Traditional Wear.
                    </p>

                    <!-- FOLLOW & CONTACT SLIM -->
                    <div class="flex gap-3 mb-6">
                        <button class="btn-slim btn-black">Follow Node</button>
                        <button class="btn-slim btn-white">Contact</button>
                    </div>

                    <!-- HIGHLIGHTS -->
                    <div class="smart-box-highlights">
                        <div class="highlights-scroll">
                            <div class="highlight-item"><div class="highlight-ring"><img src="https://images.unsplash.com/photo-1543087903-1ac2ec7aa8c5?w=100"></div><p class="highlight-label">Toubs</p></div>
                            <div class="highlight-item"><div class="highlight-ring"><img src="https://images.unsplash.com/photo-1583944438403-f5260a7c0838?w=100"></div><p class="highlight-label">Abaya</p></div>
                            <div class="highlight-item"><div class="highlight-ring"><img src="https://images.unsplash.com/photo-1574169208507-84376144848b?w=100"></div><p class="highlight-label">Tech</p></div>
                            <div class="highlight-item"><div class="highlight-ring"><img src="https://images.unsplash.com/photo-1512436991641-6745cdb1723f?w=100"></div><p class="highlight-label">Logistics</p></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- SHOWCASE & TIMELINE SLIM -->
        <div class="flex gap-4 my-6">
             <button class="btn-slim btn-white">Showcase</button>
             <button class="btn-slim btn-trans">Timeline</button>
        </div>

        <!-- GRID SECTION -->
        <div class="insta-grid pb-10">
            <div class="grid-item"><img src="https://images.unsplash.com/photo-1583944438403-f5260a7c0838?w=400"></div>
            <div class="grid-item"><img src="https://images.unsplash.com/photo-1543087903-1ac2ec7aa8c5?w=400"></div>
            <div class="grid-item"><img src="https://images.unsplash.com/photo-1574169208507-84376144848b?w=400"></div>
            <div class="grid-item"><img src="https://images.unsplash.com/photo-1547826039-bfc35e0f1ea8?w=400"></div>
            <div class="grid-item"><img src="https://images.unsplash.com/photo-1590736962100-30514a6016da?w=400"></div>
            <div class="grid-item"><img src="https://images.unsplash.com/photo-1512436991641-6745cdb1723f?w=400"></div>
            <div class="grid-item"><img src="https://images.unsplash.com/photo-1551488831-00ddcb6c6bd3?w=400"></div>
            <div class="grid-item"><img src="https://images.unsplash.com/photo-1523381210434-271e8be1f52b?w=400"></div>
            <div class="grid-item"><img src="https://images.unsplash.com/photo-1445205170230-053b830c6050?w=400"></div>
        </div>

    </main>
</body>
                                </html>
