<!DOCTYPE html>
<html lang="ha">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SYNERGY PROTOCOL | USER PROFILE</title>
    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@400;700&family=Space+Grotesk:wght@300;500;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <style>
        :root { --aqua: #00f2fe; --purple: #7000ff; --bg: #020617; }
        body { 
            background: var(--bg); color: #fff; font-family: 'Space Grotesk', sans-serif; 
            overflow-x: hidden; 
            background-image: radial-gradient(circle at 50% 50%, rgba(112, 0, 255, 0.15), transparent), url('https://www.transparenttextures.com/patterns/carbon-fibre.png'); 
            min-height: 100vh; 
        }
        .glass-premium { 
            background: rgba(255, 255, 255, 0.02); backdrop-filter: blur(40px) saturate(180%); 
            border: 1px solid rgba(255, 255, 255, 0.08); border-top: 1px solid rgba(0, 242, 254, 0.3); 
        }
        .orbitron { font-family: 'Syncopate', sans-serif; text-transform: uppercase; letter-spacing: 2px; }
        main { padding-bottom: 150px; }
        
        .profile-avatar {
            width: 100px; height: 100px;
            border-radius: 50%;
            background: linear-gradient(45deg, var(--aqua), var(--purple));
            padding: 3px;
            box-shadow: 0 0 30px rgba(0, 242, 254, 0.3);
        }

        .action-card {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.05);
            transition: all 0.3s ease;
        }
        .action-card:hover {
            background: rgba(0, 242, 254, 0.05);
            border-color: var(--aqua);
            transform: translateY(-2px);
        }

        @keyframes slideUp { from { opacity: 0; transform: translateY(40px); } to { opacity: 1; transform: translateY(0); } }
        .animate-ui { animation: slideUp 1s cubic-bezier(0.19, 1, 0.22, 1) forwards; }
    </style>
</head>
<body class="p-6">

    <main class="max-w-2xl mx-auto space-y-8 mt-12 animate-ui">
        
        <section class="text-center space-y-4">
            <div class="inline-block relative">
                <div class="profile-avatar mx-auto overflow-hidden">
                    <img id="user-img" src="https://api.dicebear.com/7.x/bottts/svg?seed=mamba" alt="Avatar" class="w-full h-full object-cover rounded-full bg-[#0a0f1e]">
                </div>
                <div class="absolute -bottom-1 -right-1 w-6 h-6 bg-green-500 border-4 border-[#020617] rounded-full"></div>
            </div>
            <div>
                <h2 id="display-username" class="orbitron text-xl font-bold tracking-[4px]">@mamba_001</h2>
                <p class="text-[10px] text-cyan-400 orbitron mt-1 tracking-[2px]">Protocol Rank: <span id="user-rank">GOLD</span></p>
            </div>
        </section>

        <div class="grid grid-cols-2 gap-4">
            <div class="glass-premium p-6 rounded-[30px] text-center">
                <p class="orbitron text-[8px] text-gray-500 mb-2">Member Since</p>
                <h4 id="join-date" class="text-lg font-bold">Jan 2026</h4>
            </div>
            <div class="glass-premium p-6 rounded-[30px] text-center border-l-2 border-l-purple-500/50">
                <p class="orbitron text-[8px] text-gray-500 mb-2">Node Level</p>
                <h4 class="text-lg font-bold">Level 04</h4>
            </div>
        </div>

        <section class="space-y-3">
            <h3 class="orbitron text-[10px] text-gray-500 pl-4 mb-4">Account Protocol</h3>
            
            <div class="action-card p-5 rounded-[25px] flex justify-between items-center cursor-pointer">
                <div class="flex items-center gap-4">
                    <div class="p-2 bg-cyan-500/10 rounded-lg text-cyan-400">
                        <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path></svg>
                    </div>
                    <div>
                        <p class="text-[13px] font-bold">Edit Core Identity</p>
                        <p class="text-[10px] text-gray-500">Update username & bio</p>
                    </div>
                </div>
                <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" class="text-gray-600"><path d="M9 5l7 7-7 7"></path></svg>
            </div>

            <div class="action-card p-5 rounded-[25px] flex justify-between items-center cursor-pointer">
                <div class="flex items-center gap-4">
                    <div class="p-2 bg-purple-500/10 rounded-lg text-purple-400">
                        <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path></svg>
                    </div>
                    <div>
                        <p class="text-[13px] font-bold">Security Shield</p>
                        <p class="text-[10px] text-gray-500">2FA & Password Encryption</p>
                    </div>
                </div>
                <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" class="text-gray-600"><path d="M9 5l7 7-7 7"></path></svg>
            </div>

            <div onclick="logout()" class="action-card p-5 rounded-[25px] flex justify-between items-center cursor-pointer border-red-500/10">
                <div class="flex items-center gap-4">
                    <div class="p-2 bg-red-500/10 rounded-lg text-red-500">
                        <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path></svg>
                    </div>
                    <div>
                        <p class="text-[13px] font-bold text-red-400">Terminate Session</p>
                        <p class="text-[10px] text-gray-500">Logout of protocol</p>
                    </div>
                </div>
            </div>
        </section>

    </main>

    <footer class="fixed bottom-8 left-10 right-10 h-20 glass-premium rounded-[35px] flex justify-around items-center z-[100]">
        <a href="https://rayhaani.github.io/Synergy-Protocol/member-dashboard" class="flex flex-col items-center gap-1 opacity-50 hover:opacity-100 transition-all">
            <span class="text-[9px] font-bold text-gray-500 orbitron">Core</span>
        </a>
        <a href="nodes.html" class="flex flex-col items-center gap-1 opacity-50 hover:opacity-100 transition-all">
            <span class="text-[9px] font-bold text-gray-500 orbitron">Nodes</span>
        </a>
        <a href="vault.html" class="flex flex-col items-center gap-1 opacity-50 hover:opacity-100 transition-all">
            <span class="text-[9px] font-bold text-gray-500 orbitron">Vault</span>
        </a>
        <a href="me.html" class="flex flex-col items-center gap-1">
            <div class="w-1.5 h-1.5 bg-cyan-400 rounded-full shadow-[0_0_15px_cyan]"></div>
            <span class="text-[9px] font-bold text-cyan-400 orbitron">Profile</span>
        </a>
    </footer>

    <script>
        const firebaseConfig = { 
            apiKey: "AIzaSyDLTwLq8Le9vYAwRkRcqXPGxFnEqW1yE2E", 
            authDomain: "synergy-protocol.firebaseapp.com", 
            projectId: "synergy-protocol", 
            storageBucket: "synergy-protocol.firebasestorage.app", 
            messagingSenderId: "179647543031", 
            appId: "1:179647543031:web:388da8a36e1bbbb55d85f2" 
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const testUser = "mamba_001";

        function loadProfile() {
            db.collection("users").doc(testUser).onSnapshot((doc) => {
                if (doc.exists) {
                    const data = doc.data();
                    document.getElementById('display-username').innerText = `@${doc.id}`;
                    document.getElementById('user-rank').innerText = data.rank || "BRONZE";
                    // Join date can be fetched if you have it in DB, or set a default
                }
            });
        }

        loadProfile();

        function logout() {
            // Add logout logic here
            alert("Terminating session...");
            window.location.href = "login.html";
        }
    </script>
</body>
</html>
