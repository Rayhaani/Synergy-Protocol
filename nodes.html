<!DOCTYPE html>
<html lang="ha">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SYNERGY PROTOCOL | NETWORK NODES</title>
    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@400;700&family=Space+Grotesk:wght@300;500;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <style>
        :root { --aqua: #00f2fe; --purple: #7000ff; --bg: #020617; }
        body { 
            background: var(--bg); color: #fff; font-family: 'Space Grotesk', sans-serif; 
            overflow-x: hidden; 
            background-image: radial-gradient(circle at 50% 50%, rgba(112, 0, 255, 0.15), transparent), url('https://www.transparenttextures.com/patterns/carbon-fibre.png'); 
            min-height: 100vh; 
        }
        .glass-premium { 
            background: rgba(255, 255, 255, 0.02); backdrop-filter: blur(40px) saturate(180%); 
            border: 1px solid rgba(255, 255, 255, 0.08); border-top: 1px solid rgba(0, 242, 254, 0.3); 
        }
        .orbitron { font-family: 'Syncopate', sans-serif; text-transform: uppercase; letter-spacing: 3px; }
        main { padding-bottom: 150px; }
        
        @keyframes slideUp { from { opacity: 0; transform: translateY(40px); } to { opacity: 1; transform: translateY(0); } }
        .animate-ui { animation: slideUp 1s cubic-bezier(0.19, 1, 0.22, 1) forwards; }

        .synergy-toast {
            position: fixed; top: -100px; left: 50%; transform: translateX(-50%);
            background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(15px);
            border: 1px solid var(--aqua); color: white; padding: 12px 25px;
            border-radius: 12px; z-index: 9999; transition: all 0.5s ease;
            font-family: 'Syncopate', sans-serif; font-size: 10px;
        }
        .synergy-toast.show { top: 30px; }
    </style>
</head>
<body class="p-6">

    <main class="max-w-2xl mx-auto space-y-10 mt-16 animate-ui">
        
        <section class="glass-premium p-10 rounded-[45px] relative overflow-hidden">
            <div class="absolute -top-24 -right-24 w-48 h-48 bg-cyan-500/10 blur-[80px]"></div>
            
            <div class="text-center space-y-12 relative z-10">
                <h2 class="orbitron text-[14px] text-cyan-400 tracking-[8px] font-bold">NETWORK EXPANSION</h2>
                
                <div class="grid grid-cols-2 gap-6">
                    <div class="bg-black/40 p-8 rounded-[35px] border border-white/5 shadow-inner">
                        <p class="orbitron text-[9px] text-gray-500 tracking-[2px] mb-2 uppercase">Total Referrals</p>
                        <h4 id="ref-count" class="text-4xl font-black text-white">0</h4>
                    </div>
                    <div class="bg-black/40 p-8 rounded-[35px] border border-white/5 shadow-inner">
                        <p class="orbitron text-[9px] text-gray-500 tracking-[2px] mb-2 uppercase">Node Status</p>
                        <h4 class="text-[12px] font-bold text-green-400 orbitron tracking-[2px] animate-pulse">ACTIVE</h4>
                    </div>
                </div>

                <div class="space-y-6 pt-4">
                    <p class="orbitron text-[9px] text-gray-400 tracking-[3px] uppercase">Unique Node Link</p>
                    <div class="flex items-center gap-3 bg-black/60 p-5 rounded-2xl border border-cyan-500/20 group hover:border-cyan-500/50 transition-all">
                        <input type="text" id="ref-link" readonly value="Loading..." 
                               class="bg-transparent text-[12px] text-cyan-300 w-full outline-none font-mono tracking-widest">
                        <button onclick="copyRef()" class="p-2 text-cyan-400 hover:scale-110 transition-transform">
                            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>
                        </button>
                    </div>
                    <p class="text-[10px] text-gray-600 italic px-4">Refer new nodes to maximize your protocol yield and network stability.</p>
                </div>
            </div>
        </section>

    </main>

    <footer class="fixed bottom-8 left-10 right-10 h-20 glass-premium rounded-[35px] flex justify-around items-center z-[100]">
        <a href="index.html" class="flex flex-col items-center gap-1 opacity-50 hover:opacity-100 transition-all">
            <span class="text-[10px] font-bold text-gray-500 orbitron">Core</span>
        </a>

        <a href="nodes.html" class="flex flex-col items-center gap-1">
            <div class="w-1.5 h-1.5 bg-cyan-400 rounded-full shadow-[0_0_15px_cyan]"></div>
            <span class="text-[10px] font-bold text-cyan-400 orbitron">Nodes</span>
        </a>

        <a href="vault.html" class="flex flex-col items-center gap-1 opacity-50 hover:opacity-100 transition-all">
            <span class="text-[10px] font-bold text-gray-500 orbitron">Vault</span>
        </a>

        <a href="meta.html" class="flex flex-col items-center gap-1 opacity-50 hover:opacity-100 transition-all">
            <span class="text-[10px] font-bold text-gray-500 orbitron">Meta</span>
        </a>
    </footer>

    <script>
        const firebaseConfig = { 
            apiKey: "AIzaSyDLTwLq8Le9vYAwRkRcqXPGxFnEqW1yE2E", 
            authDomain: "synergy-protocol.firebaseapp.com", 
            projectId: "synergy-protocol", 
            storageBucket: "synergy-protocol.firebasestorage.app", 
            messagingSenderId: "179647543031", 
            appId: "1:179647543031:web:388da8a36e1bbbb55d85f2" 
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const testUser = "mamba_001";

        function syncNodeData() {
            db.collection("users").doc(testUser).onSnapshot((doc) => {
                if (doc.exists) {
                    const data = doc.data();
                    document.getElementById('ref-count').innerText = data.referrals || 0;
                    document.getElementById('ref-link').value = `https://synergy.io/ref/${testUser}`;
                }
            });
        }
        syncNodeData();

        function copyRef() {
            const copyText = document.getElementById("ref-link");
            copyText.select();
            navigator.clipboard.writeText(copyText.value);
            showToast("LINK COPIED");
        }

        function showToast(msg) {
            let toast = document.getElementById('synergy-toast');
            if(!toast) {
                toast = document.createElement('div');
                toast.id = 'synergy-toast';
                toast.className = 'synergy-toast';
                document.body.appendChild(toast);
            }
            toast.innerText = msg;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3000);
        }
    </script>
</body>
    </html>
