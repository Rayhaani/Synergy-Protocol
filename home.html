<!DOCTYPE html>
<html lang="ha">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SYNERGY | ORBITAL SYSTEM</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;500;800&family=Syncopate:wght@700&display=swap" rel="stylesheet">
    <style>
        body { 
            background: radial-gradient(circle at center, #050a15 0%, #000 100%);
            color: #fff; 
            font-family: 'Plus Jakarta Sans', sans-serif;
            height: 100vh; 
            overflow: hidden; 
            display: flex; 
            flex-direction: column;
            align-items: center; 
            justify-content: flex-start;
            padding: 10px 20px; 
        }
        .orbitron { font-family: 'Syncopate', sans-serif; }

        /* NAV LOGO & MENU */
        .header-nav {
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            max-width: 1200px;
            z-index: 100;
            margin-top: 10px; 
            margin-bottom: 40px; 
            position: relative;
        }
        .nav-logo {
            font-weight: 800;
            letter-spacing: -1px;
            font-size: 24px;
        }
        .menu-icon {
            width: 30px;
            height: 20px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            cursor: pointer;
            z-index: 1001;
        }
        .menu-bar {
            width: 100%;
            height: 2px;
            background: #fff;
            border-radius: 2px;
            transition: 0.3s;
        }
        .menu-bar.short { width: 60%; align-self: flex-end; }

        /* PASSIONATE SMALL MENU */
        #side-menu {
            position: absolute;
            top: 40px; 
            right: 0;
            width: 180px; 
            background: rgba(10, 15, 25, 0.95);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(0, 242, 254, 0.2);
            border-radius: 12px;
            z-index: 1000;
            display: none; 
            flex-direction: column;
            padding: 15px 0;
            box-shadow: 0 15px 40px rgba(0,0,0,0.8);
        }
        #side-menu.active { display: flex; }
        
        .menu-link {
            padding: 12px 25px;
            font-size: 10px;
            font-weight: 700;
            color: #888;
            text-decoration: none;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            text-transform: uppercase;
            letter-spacing: 2px;
            display: block;
        }

        /* EFFECT: Canza kala da gungurawa zuwa dama */
        .menu-link:hover { 
            color: #00f2fe; 
            padding-left: 35px; /* Gungurawar nan ce */
            background: rgba(0, 242, 254, 0.05);
        }

        /* HERO SECTION */
        .hero-layer {
            width: 100%;
            text-align: center;
            z-index: 50;
            margin-bottom: 20px; 
        }
        .hero-h1 {
            font-size: clamp(2.2rem, 10vw, 3.8rem);
            font-weight: 800;
            letter-spacing: -0.05em;
            line-height: 1.1;
            margin: 0;
        }
        .hero-h1 span { color: #00f2fe; }
        .hero-p {
            font-size: 13px;
            color: #888;
            max-width: 350px;
            margin: 20px auto 0;
            line-height: 1.6;
        }

        /* ORBITAL SYSTEM */
        .main-container {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            flex-grow: 1;
            min-height: 350px;
        }
        .core-system {
            width: 140px; height: 140px;
            background: radial-gradient(circle, #00f2fe 0%, transparent 70%);
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 0 50px rgba(0, 242, 254, 0.4);
            position: relative; z-index: 10;
            animation: pulse 4s ease-in-out infinite;
        }
        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 0.8; }
            50% { transform: scale(1.1); opacity: 1; }
        }
        .orbit-container {
            position: absolute; 
            width: 300px; height: 300px;
            border: 1px solid rgba(0, 242, 254, 0.1);
            border-radius: 50%;
            animation: rotate 20s linear infinite;
        }
        .node-item {
            position: absolute; 
            width: 65px; height: 65px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 18px;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            animation: counter-rotate 20s linear infinite;
            cursor: pointer; transition: 0.3s;
        }
        .node-item:hover { border-color: #00f2fe; background: rgba(0, 242, 254, 0.1); transform: scale(1.1); }
        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        @keyframes counter-rotate { from { transform: rotate(0deg); } to { transform: rotate(-360deg); } }

        .n1 { top: -32.5px; left: 50%; margin-left: -32.5px; }
        .n2 { bottom: -32.5px; left: 50%; margin-left: -32.5px; }
        .n3 { left: -32.5px; top: 50%; margin-top: -32.5px; }
        .n4 { right: -32.5px; top: 50%; margin-top: -32.5px; }

        .footer-info {
            text-align: center;
            width: 100%;
            padding-top: 20px;
            padding-bottom: 20px;
        }
    </style>
</head>
<body>

    <header class="header-nav">
        <div class="nav-logo">
            SYNERGY<span class="text-cyan-400">.</span>
        </div>
        <div class="menu-icon" id="menuBtn">
            <div class="menu-bar"></div>
            <div class="menu-bar short"></div>
            <div class="menu-bar"></div>
        </div>

        <nav id="side-menu">

            <a href="home.html" class="menu-link orbitron">Home</a>
            <a href="signup.html" class="menu-link orbitron">Signup</a>
            <a href="signin.html" class="menu-link orbitron">Sign In</a>
            <a href="contact.html" class="menu-link orbitron">Contact Us</a>
            <a href="about.html" class="menu-link orbitron">About Us</a>
        </nav>
    </header>

    <div class="hero-layer">
        <h1 class="hero-h1">Ready to <span>scale</span> your automation?</h1>
        <p class="hero-p">
            Synergy is the world's first neural verification ecosystem. Save up to 90% of your time with automated YouTube nodes.
        </p>
    </div>

    <div class="main-container">
        <div class="core-system">
            <div class="text-black orbitron text-[10px] font-black text-center">SYNERGY<br>CORE</div>
        </div>

        <div class="orbit-container">
            <div onclick="location.href='activation.html'" class="node-item n1">
                <span class="text-lg">⚡</span>
                <span class="text-[7px] orbitron mt-1">Activate</span>
            </div>
            <div class="node-item n2">
                <span class="text-lg">📊</span>
                <span class="text-[7px] orbitron mt-1">Stats</span>
            </div>
            <div class="node-item n3">
                <span class="text-lg">🔒</span>
                <span class="text-[7px] orbitron mt-1">Security</span>
            </div>
            <div class="node-item n4">
                <span class="text-lg">💰</span>
                <span class="text-[7px] orbitron mt-1">Yield</span>
            </div>
        </div>
    </div>

    <div class="footer-info">
        <h2 class="orbitron text-[10px] tracking-[8px] opacity-30 uppercase">Global Infrastructure</h2>
    </div>

    <script>
        const menuBtn = document.getElementById('menuBtn');
        const sideMenu = document.getElementById('side-menu');

        menuBtn.onclick = (e) => {
            sideMenu.classList.toggle('active');
            e.stopPropagation();
        }

        document.onclick = (e) => {
            if (!sideMenu.contains(e.target) && e.target !== menuBtn) {
                sideMenu.classList.remove('active');
            }
        }
    </script>

</body>
                </html>
