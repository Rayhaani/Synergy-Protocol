<!DOCTYPE html>
<html lang="ha">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@400;700&family=Inter:wght@100;200;300;400;700&family=Space+Grotesk:wght@300;400;700&family=JetBrains+Mono:wght@300;400;700&family=Outfit:wght@200;300;700&family=Kanit:wght@200;300;700&family=Rajdhani:wght@300;700&family=Roboto+Mono:wght@300;400;700&family=Public+Sans:wght@200;300;700&family=Lexend:wght@200;300;700&family=Manrope:wght@200;300;700&family=Plus+Jakarta+Sans:wght@200;300;700&family=Sora:wght@200;300;700&display=swap" rel="stylesheet">
    <title>QUANTUM LEDGER</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --aqua: #00f2fe; --purple: #7000ff; --bg: #020617; }
        
        body { 
            background: var(--bg); 
            color: #fff; 
            font-family: 'Inter', sans-serif; 
            background-image: radial-gradient(circle at 50% 50%, rgba(112, 0, 255, 0.1), transparent), url('https://www.transparenttextures.com/patterns/carbon-fibre.png'); 
            min-height: 100vh;
            margin: 0; padding: 0;
        }

        .orbitron { font-family: 'Syncopate', sans-serif; text-transform: uppercase; letter-spacing: 2px; }

        .google-popup {
            position: absolute; top: 50px; right: 0; width: 180px;
            background: #151515; border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 16px; z-index: 10000; padding: 8px;
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.9);
            opacity: 0; transform: scale(0.9); pointer-events: none;
            transform-origin: top right;
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .google-popup.active { opacity: 1; transform: scale(1); pointer-events: auto; }
        .menu-item {
            display: flex; align-items: center; gap: 12px;
            padding: 10px 14px; border-radius: 10px;
            color: #efefef; font-size: 13px; font-weight: 500;
            transition: 0.2s; cursor: pointer;
        }
        .menu-item:hover { background: rgba(255, 255, 255, 0.08); }
        .menu-item svg { width: 16px; height: 16px; stroke: #888; fill: none; stroke-width: 2; }
        .menu-divider { height: 1px; background: rgba(255, 255, 255, 0.05); margin: 4px 0; }

        .master-card {
            background: rgba(255, 255, 255, 0.015);
            backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.04);
            border-top: 1px solid rgba(0, 242, 254, 0.2);
        }

        /* BOLDED LAMBOBI KAWAI */
        .digits-terminal { font-family: 'Roboto Mono', monospace; font-weight: 700; color: #00f2fe; }
        
        /* GYARA: Normal font ga Enter Amount */
        .input-normal { font-family: 'Roboto Mono', monospace; font-weight: 300 !important; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .fade-in { animation: fadeIn 0.8s ease-out forwards; }
    </style>
</head>
<body>

    <nav class="sticky top-0 z-[10000] p-5 flex justify-between items-center px-8 bg-[#0a0a0a] border-b border-cyan-900/20">
        <div class="flex items-center gap-3">
            <div class="w-8 h-8 rounded-full border-2 border-dashed border-cyan-500 flex items-center justify-center p-1">
                <div class="w-full h-full bg-cyan-500 rounded-full shadow-[0_0_15px_#00f2fe]"></div>
            </div>
            <h1 class="orbitron text-[13px] text-white font-bold tracking-[4px] whitespace-nowrap uppercase">Synergy Protocol</h1>
        </div>

        <div class="relative">
            <div class="menu-trigger cursor-pointer p-2 hover:bg-white/5 rounded-lg transition-all" onclick="toggleGoogleMenu(event)">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="1"></circle><circle cx="12" cy="5" r="1"></circle><circle cx="12" cy="19" r="1"></circle>
                </svg>
            </div>
            <div id="google-nav" class="google-popup">
                <div class="menu-item" onclick="location.href='dashboard.html'">
                    <svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7"></rect><rect x="14" y="3" width="7" height="7"></rect><rect x="14" y="14" width="7" height="7"></rect><rect x="3" y="14" width="7" height="7"></rect></svg>
                    <span>Dashboard</span>
                </div>
                <div class="menu-item" onclick="location.href='wallet.html'">
                    <svg viewBox="0 0 24 24"><path d="M20 12V8H4v4M20 12v4H4v-4M20 12H4M12 4v16"></path></svg>
                    <span>Wallet</span>
                </div>
                <div class="menu-item" onclick="location.href='network.html'">
                    <svg viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle><path d="M23 21v-2a4 4 0 0 0-3-3.87M16 3.13a4 4 0 0 1 0 7.75"></path></svg>
                    <span>Network</span>
                </div>
                <div class="menu-divider"></div>
                <div class="menu-item" onclick="location.href='security.html'">
                    <svg viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
                    <span>Security</span>
                </div>
            </div>
        </div>
    </nav>

    <main class="p-6 max-w-md mx-auto space-y-6 mt-4">
        
        <!-- 1. MAIN EQUITY CARD -->
        <section class="master-card rounded-[32px] p-8 text-center fade-in">
            <p class="orbitron text-[8px] text-gray-500 mb-3">Available Equity</p>
            <h1 class="digits-terminal text-[42px] text-white leading-none mb-4">
                <span class="text-gray-500 text-2xl">₦</span>2,850<span class="text-gray-500 text-2xl">.00</span>
            </h1>
            <div class="flex justify-center items-center gap-2 mb-8">
                <div class="w-1 h-1 rounded-full bg-cyan-400 animate-pulse"></div>
                <span class="orbitron text-[7px] text-cyan-400">Node Verified</span>
            </div>
            <div class="space-y-4">
                <input type="number" id="withdraw-amount" placeholder="Enter Amount" class="w-full bg-black/40 border border-white/10 p-4 rounded-2xl input-normal text-white outline-none focus:border-cyan-500/50 transition-all">
                <button class="w-full py-5 rounded-2xl bg-white text-black orbitron font-bold text-[11px] tracking-[2px] hover:bg-cyan-400 transition-all shadow-[0_10px_30px_rgba(255,255,255,0.05)]">
                  Process Transaction
                </button>
            </div>
        </section>

        <!-- 2. METRICS GRID -->
        <section class="grid grid-cols-2 gap-4 fade-in" style="animation-delay: 0.2s;">
            <div class="master-card rounded-[24px] p-5">
                <p class="orbitron text-[7px] text-gray-500 mb-2">Total Earned</p>
                <h4 class="digits-terminal text-xl text-white">₦15,400</h4>
            </div>
            <div class="master-card rounded-[24px] p-5">
                <p class="orbitron text-[7px] text-gray-500 mb-2">Withdrawn</p>
                <h4 class="digits-terminal text-xl text-white">₦12,550</h4>
            </div>
        </section>

        <!-- 3. TRANSACTION LIST (WITH BOTH TRANSACTIONS) -->
        <section class="master-card rounded-[30px] p-7 fade-in" style="animation-delay: 0.4s;">
            <div class="flex justify-between items-center mb-6">
                <h3 class="orbitron text-[9px] text-cyan-500">History</h3>
                <span class="text-[8px] text-gray-600 orbitron">Secure Ledger</span>
            </div>
            <div class="space-y-4">
                <div class="flex justify-between items-center py-3 border-b border-white/[0.03]">
                    <div>
                        <p class="text-[12px] font-medium text-gray-200">Asset Transfer</p>
                        <p class="text-[9px] text-gray-500 uppercase">15 Mar 2026</p>
                    </div>
                    <div class="text-right">
                        <p class="digits-terminal text-[13px] text-red-400">-₦5,000</p>
                        <p class="orbitron text-[6px] text-green-500">Confirmed</p>
                    </div>
                </div>

                <div class="flex justify-between items-center py-3">
                    <div>
                        <p class="text-[12px] font-medium text-gray-200">Protocol Yield</p>
                        <p class="text-[9px] text-gray-500 uppercase">14 Mar 2026</p>
                    </div>
                    <div class="text-right">
                        <p class="digits-terminal text-[13px] text-green-400">+₦150</p>
                        <p class="orbitron text-[6px] text-gray-600">Settled</p>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <script>
        function toggleGoogleMenu(event) {
            event.stopPropagation();
            document.getElementById('google-nav').classList.toggle('active');
        }
        window.onclick = () => document.getElementById('google-nav').classList.remove('active');
    </script>
</body>
    </html>
