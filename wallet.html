<!DOCTYPE html>
<html lang="ha">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@400;700&family=Inter:wght@100;200;300;400;700&family=Space+Grotesk:wght@300;400;700&family=JetBrains+Mono:wght@300;400;700&family=Outfit:wght@200;300;700&family=Kanit:wght@200;300;700&family=Rajdhani:wght@300;700&family=Roboto+Mono:wght@300;400;700&family=Public+Sans:wght@200;300;700&family=Lexend:wght@200;300;700&family=Manrope:wght@200;300;700&family=Plus+Jakarta+Sans:wght@200;300;700&family=Sora:wght@200;300;700&display=swap" rel="stylesheet">
    <title>QUANTUM LEDGER</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --aqua: #00f2fe; --purple: #7000ff; --bg: #020617; }
        body { background: var(--bg); color: #fff; font-family: 'Inter', sans-serif; background-image: radial-gradient(circle at 50% 50%, rgba(112, 0, 255, 0.1), transparent), url('https://www.transparenttextures.com/patterns/carbon-fibre.png'); min-height: 100vh; margin: 0; padding: 0; }
        .orbitron { font-family: 'Syncopate', sans-serif; text-transform: uppercase; letter-spacing: 2px; }
        .google-popup { position: absolute; top: 50px; right: 0; width: 180px; background: #151515; border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 16px; z-index: 10000; padding: 8px; box-shadow: 0 15px 40px rgba(0, 0, 0, 0.9); opacity: 0; transform: scale(0.9); pointer-events: none; transform-origin: top right; transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1); }
        .google-popup.active { opacity: 1; transform: scale(1); pointer-events: auto; }
        .menu-item { display: flex; align-items: center; gap: 12px; padding: 10px 14px; border-radius: 10px; color: #efefef; font-size: 13px; font-weight: 500; transition: 0.2s; cursor: pointer; }
        .menu-item:hover { background: rgba(255, 255, 255, 0.08); }
        .menu-item svg { width: 16px; height: 16px; stroke: #888; fill: none; stroke-width: 2; }
        .menu-divider { height: 1px; background: rgba(255, 255, 255, 0.05); margin: 4px 0; }
        .master-card { background: rgba(255, 255, 255, 0.015); backdrop-filter: blur(25px); border: 1px solid rgba(255, 255, 255, 0.04); border-top: 1px solid rgba(0, 242, 254, 0.2); }
        .digits-terminal { font-family: 'Roboto Mono', monospace; font-weight: 700; color: #00f2fe; }
        .input-normal { font-family: 'Roboto Mono', monospace; font-weight: 300 !important; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .fade-in { animation: fadeIn 0.8s ease-out forwards; }
    </style>
</head>
<body>

    <nav class="sticky top-0 z-[10000] p-5 flex justify-between items-center px-8 bg-[#0a0a0a] border-b border-cyan-900/20">
        <div class="flex items-center gap-3">
            <div class="w-8 h-8 rounded-full border-2 border-dashed border-cyan-500 flex items-center justify-center p-1">
                <div class="w-full h-full bg-cyan-500 rounded-full shadow-[0_0_15px_#00f2fe]"></div>
            </div>
            <h1 class="orbitron text-[13px] text-white font-bold tracking-[4px] whitespace-nowrap uppercase">Synergy Protocol</h1>
        </div>
        <div class="relative">
            <div class="menu-trigger cursor-pointer p-2 hover:bg-white/5 rounded-lg transition-all" onclick="toggleGoogleMenu(event)">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="1"></circle><circle cx="12" cy="5" r="1"></circle><circle cx="12" cy="19" r="1"></circle>
                </svg>
            </div>
            <div id="google-nav" class="google-popup" style="width: 165px; padding: 6px;">
                <div class="menu-item" onclick="location.href='dashboard.html'"><svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7"></rect><rect x="14" y="3" width="7" height="7"></rect><rect x="14" y="14" width="7" height="7"></rect><rect x="3" y="14" width="7" height="7"></rect></svg><span>Dashboard</span></div>
                <div class="menu-item" onclick="location.href='wallet.html'"><svg viewBox="0 0 24 24"><path d="M20 12V8H4v4M20 12v4H4v-4M20 12H4M12 4v16"></path></svg><span>Wallet</span></div>
                <div class="menu-item" onclick="location.href='network.html'"><svg viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle><path d="M23 21v-2a4 4 0 0 0-3-3.87M16 3.13a4 4 0 0 1 0 7.75"></path></svg><span>Network</span></div>
                <div class="menu-divider"></div>
                <div class="menu-item" onclick="location.href='mining.html'"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m13 10 3.5-3.5a2 2 0 0 1 2.8 2.8L15.8 12.8a4.9 4.9 0 0 1-5.3 1.3L4 20l-2-2 5.9-6.5a4.9 4.9 0 0 1 1.3-5.3L12.7 2.7a2 2 0 0 1 2.8 2.8L12 9"></path></svg><span>Mining</span></div>
                <div class="menu-item" onclick="location.href='profile.html'"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg><span>Profile</span></div>
            </div>
        </div>
    </nav>

    <main class="p-6 max-w-md mx-auto space-y-6 mt-4">
        <section class="master-card rounded-[32px] p-8 text-center fade-in">
            <p class="orbitron text-[8px] text-gray-500 mb-3">Available Equity</p>
            <h1 id="main-equity-display" class="digits-terminal text-[42px] text-white leading-none mb-4">
                <span class="text-gray-500 text-2xl">₦</span>0<span class="text-gray-500 text-2xl">.00</span>
            </h1>
            <div class="flex justify-center items-center gap-2 mb-8">
                <div class="w-1 h-1 rounded-full bg-cyan-400 animate-pulse"></div>
                <span class="orbitron text-[7px] text-cyan-400">Node Verified</span>
            </div>
            <div class="space-y-4">
                <input type="number" id="withdraw-amount" placeholder="Enter Amount" class="w-full bg-black/40 border border-white/10 p-4 rounded-2xl input-normal text-white outline-none focus:border-cyan-500/50 transition-all">
                <button id="withdraw-btn" class="w-full py-5 rounded-2xl bg-white text-black orbitron font-bold text-[11px] tracking-[2px] hover:bg-cyan-400 transition-all shadow-[0_10px_30px_rgba(255,255,255,0.05)]">
                  Process Transaction
                </button>
                <p onclick="openWithdrawalModal()" class="text-center text-[9px] text-cyan-700 orbitron cursor-pointer mt-4 hover:text-cyan-400">Settlement Details</p>
            </div>
        </section>

        <section class="grid grid-cols-2 gap-4 fade-in" style="animation-delay: 0.2s;">
            <div class="master-card rounded-[24px] p-5">
                <p class="orbitron text-[7px] text-gray-500 mb-2">Total Earned</p>
                <h4 id="total-earned-display" class="digits-terminal text-xl text-white">₦0</h4>
            </div>
            <div class="master-card rounded-[24px] p-5">
                <p class="orbitron text-[7px] text-gray-500 mb-2">Withdrawn</p>
                <h4 id="withdrawn-display" class="digits-terminal text-xl text-white">₦0</h4>
            </div>
        </section>

        <section class="master-card rounded-[30px] p-7 fade-in" style="animation-delay: 0.4s;">
            <div class="flex justify-between items-center mb-6">
                <h3 class="orbitron text-[9px] text-cyan-500">History</h3>
                <span class="text-[8px] text-gray-600 orbitron">Secure Ledger</span>
            </div>
            <div id="history-list" class="space-y-4">
                <p class="text-center text-[10px] text-gray-600 uppercase py-4">Synchronizing Ledger...</p>
            </div>
        </section>
    </main>

    <div id="withdrawal-modal" class="fixed inset-0 z-[20000] hidden">
        <div class="absolute inset-0 bg-black/80 backdrop-blur-sm" onclick="closeWithdrawalModal()"></div>
        <div class="absolute bottom-0 left-0 right-0 master-card rounded-t-[40px] p-8 border-t border-cyan-500/30">
            <div class="w-12 h-1 bg-white/10 rounded-full mx-auto mb-6"></div>
            <h3 class="orbitron text-center text-sm mb-8 tracking-[3px]">Settlement Details</h3>
            <div class="space-y-5">
                <div>
                    <label class="orbitron text-[8px] text-gray-500 ml-2">Bank Name</label>
                    <input type="text" id="bank-name" placeholder="e.g. Opay, Kuda, GTBank" class="w-full bg-black/40 border border-white/10 p-4 rounded-2xl input-normal text-white outline-none">
                </div>
                <div>
                    <label class="orbitron text-[8px] text-gray-500 ml-2">Account Number</label>
                    <input type="number" id="account-number" placeholder="0000000000" class="w-full bg-black/40 border border-white/10 p-4 rounded-2xl input-normal text-white outline-none">
                </div>
                <div>
                    <label class="orbitron text-[8px] text-gray-500 ml-2">Account Name</label>
                    <input type="text" id="account-name" placeholder="Full Legal Name" class="w-full bg-black/40 border border-white/10 p-4 rounded-2xl input-normal text-white outline-none">
                </div>
                <button onclick="saveWithdrawalDetails()" class="w-full py-5 rounded-2xl bg-cyan-500 text-black orbitron font-bold text-[11px] tracking-[2px]">Save & Lock Details</button>
                <button onclick="closeWithdrawalModal()" class="w-full py-3 text-[10px] orbitron text-gray-600">Cancel</button>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
    <script>
    const firebaseConfig = { 
        apiKey: "AIzaSyDLTwLq8Le9vYAwRkRcqXPGxFnEqW1yE2E", 
        authDomain: "synergy-protocol.firebaseapp.com", 
        projectId: "synergy-protocol", 
        storageBucket: "synergy-protocol.firebasestorage.app", 
        messagingSenderId: "179647543031", 
        appId: "1:179647543031:web:388da8a36e1bbbb55d85f2" 
    };

    if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
    const db = firebase.firestore();
    const currentActiveUser = localStorage.getItem('synergy_user');

    // Muna bukatar global variable domin adana bank details
    let userBankData = null;

    async function syncWalletData() {
        if (!currentActiveUser) { window.location.replace("signin.html"); return; }
        
        db.collection("users").doc(currentActiveUser).onSnapshot((doc) => {
            if (doc.exists) {
                const data = doc.data();
                const vBal = data.videoBalance || 0;
                const sBal = data.shareBalance || 0;
                const totalEarned = vBal + sBal;
                const withdrawn = data.totalWithdrawn || 0;
                const availableEquity = totalEarned - withdrawn;

                // Update displays
                document.getElementById('main-equity-display').innerHTML = `<span class="text-gray-500 text-2xl">₦</span>${availableEquity.toLocaleString()}<span class="text-gray-500 text-2xl">.00</span>`;
                document.getElementById('total-earned-display').innerText = `₦${totalEarned.toLocaleString()}`;
                document.getElementById('withdrawn-display').innerText = `₦${withdrawn.toLocaleString()}`;

                // Ajiye bank details a global variable
                userBankData = data.bankDetails || null;

                // Saka bayanan banki a cikin inputs idan akwai su
                if (userBankData) {
                    document.getElementById('bank-name').value = userBankData.bankName || '';
                    document.getElementById('account-number').value = userBankData.accountNumber || '';
                    document.getElementById('account-name').value = userBankData.accountName || '';
                }

                updateTransactionHistory(data);
                controlWithdrawButton(data.isVerified, availableEquity);
            }
        });
    }

        function controlWithdrawButton(isVerified, balance) {
        const btn = document.getElementById('withdraw-btn');
        if (!btn) return;

        if (isVerified === true) {
            btn.disabled = false; 
            btn.style.opacity = "1"; 
            btn.innerText = "Process Transaction";
            
            btn.onclick = async () => {
                if (!userBankData || !userBankData.accountNumber) {
                    alert("SETTLEMENT REQUIRED: Please update your bank details.");
                    openWithdrawalModal();
                    return;
                }

                const amountInput = document.getElementById('withdraw-amount');
                const amount = parseFloat(amountInput.value);

                if (!amount || amount <= 0) { alert("PLEASE ENTER VALID AMOUNT"); return; }
                if (amount > balance) { alert("INSUFFICIENT EQUITY"); return; }
                if (amount < 100) { alert("MINIMUM WITHDRAWAL: ₦100"); return; }

                try {
                    btn.disabled = true;
                    btn.innerText = "Processing...";

                    await db.collection("withdrawals").add({
                        userId: currentActiveUser,
                        amount: amount,
                        bankDetails: userBankData,
                        status: "pending",
                        timestamp: firebase.firestore.FieldValue.serverTimestamp()
                    });

                    await db.collection("users").doc(currentActiveUser).update({
                        totalWithdrawn: firebase.firestore.FieldValue.increment(amount)
                    });
                    
                    alert(`SUCCESS: ₦${amount} has been deducted.`);
                    amountInput.value = ""; 
                    btn.innerText = "Process Transaction";
                    btn.disabled = false;
                } catch (error) {
                    alert("SYSTEM ERROR: Transaction failed.");
                    btn.innerText = "Process Transaction";
                    btn.disabled = false;
                }
            };
        } else {
            btn.disabled = true; 
            btn.style.opacity = "0.3"; 
            btn.innerText = "LOCKED: ACTIVATE NODES";
        }
        }

        async function updateTransactionHistory(userData) {
        const historyContainer = document.getElementById('history-list');
        if (!historyContainer) return;

        try {
            // 1. Nemo dukkan withdrawals na wannan mamban daga collection na 'withdrawals'
            const snapshot = await db.collection("withdrawals")
                .where("userId", "==", currentActiveUser)
                .orderBy("timestamp", "desc")
                .limit(10)
                .get();

            let historyHTML = '';

            // A. Saka Protocol Yield (Earnings) a matsayin head
            if (userData.videoBalance > 0 || userData.shareBalance > 0) {
                historyHTML += `
                    <div class="flex justify-between items-center py-3 border-b border-white/[0.03]">
                        <div>
                            <p class="text-[11px] font-medium text-gray-200">Protocol Yield</p>
                            <p class="text-[8px] text-gray-500 uppercase">Total Accumulated Assets</p>
                        </div>
                        <div class="text-right">
                            <p class="digits-terminal text-[12px] text-green-400">+₦${(userData.videoBalance + userData.shareBalance).toLocaleString()}</p>
                            <span class="text-[7px] orbitron text-cyan-600">Active</span>
                        </div>
                    </div>`;
            }

            // B. Saka kowane Withdrawal daya bayan daya
            if (!snapshot.empty) {
                snapshot.forEach(doc => {
                    const tx = doc.data();
                    let statusColor = "text-yellow-500"; // Default: Pending
                    let statusBg = "border-yellow-900/20";
                    
                    if (tx.status === "approved") { statusColor = "text-green-500"; }
                    if (tx.status === "rejected") { statusColor = "text-red-500"; }

                    historyHTML += `
                        <div class="flex justify-between items-center py-4 border-b border-white/[0.02]">
                            <div>
                                <p class="text-[11px] font-medium text-white">Withdrawal: ₦${tx.amount.toLocaleString()}</p>
                                <p class="text-[8px] text-gray-500 uppercase">${tx.bankDetails?.bankName || 'Bank Transfer'}</p>
                            </div>
                            <div class="text-right">
                                <p class="digits-terminal text-[11px] ${statusColor}">-₦${tx.amount.toLocaleString()}</p>
                                <span class="text-[7px] orbitron font-bold ${statusColor}">${tx.status.toUpperCase()}</span>
                            </div>
                        </div>`;
                });
            } else {
                if (historyHTML === '') {
                    historyHTML = '<p class="text-center text-[10px] text-gray-600 uppercase py-8">No transaction logs found</p>';
                }
            }

            historyContainer.innerHTML = historyHTML;

        } catch (error) {
            console.error("History Error:", error);
            historyContainer.innerHTML = '<p class="text-center text-[9px] text-red-800 uppercase py-4">Sync Error: Check Indexing</p>';
        }
                    }
        

    function openWithdrawalModal() { document.getElementById('withdrawal-modal').classList.remove('hidden'); }
    function closeWithdrawalModal() { document.getElementById('withdrawal-modal').classList.add('hidden'); }

    async function saveWithdrawalDetails() {
        const bank = document.getElementById('bank-name').value;
        const accNum = document.getElementById('account-number').value;
        const accName = document.getElementById('account-name').value;
        if (!bank || !accNum || !accName) { alert("Please fill all settlement fields!"); return; }

        try {
            await db.collection("users").doc(currentActiveUser).update({
                bankDetails: { bankName: bank, accountNumber: accNum, accountName: accName, updatedAt: firebase.firestore.FieldValue.serverTimestamp() }
            });
            alert("SETTLEMENT DETAILS SECURED!");
            closeWithdrawalModal();
        } catch (error) { alert("System Error. Try again."); }
    }

    function toggleGoogleMenu(event) {
        event.stopPropagation();
        document.getElementById('google-nav').classList.toggle('active');
    }

    window.onclick = function() {
        const menu = document.getElementById('google-nav');
        if (menu && menu.classList.contains('active')) {
            menu.classList.remove('active');
        }
    };

    syncWalletData();
    </script>
    <script src="app.js"></script>
</body>
</html>
 </html>
