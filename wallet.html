<!DOCTYPE html>
<html lang="ha">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SYNERGY PROTOCOL | SECURE VAULT</title>
    <!-- Fonts: Inter (Financial) & Syncopate (Cyber) -->
    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@400;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --aqua: #00f2fe; --purple: #7000ff; --bg: #020617; }
        
        body { 
            background: var(--bg); 
            color: #fff; 
            font-family: 'Inter', sans-serif; 
            background-image: radial-gradient(circle at 50% 50%, rgba(112, 0, 255, 0.1), transparent), url('https://www.transparenttextures.com/patterns/carbon-fibre.png'); 
            min-height: 100vh;
            margin: 0;
            padding: 0;
        }

        /* Essential Classes */
        .orbitron { font-family: 'Syncopate', sans-serif; text-transform: uppercase; letter-spacing: 4px; }
        
        /* Master Card Styling */
        .master-card {
            background: rgba(255, 255, 255, 0.015);
            backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.04);
            border-top: 1px solid rgba(0, 242, 254, 0.2);
            transition: transform 0.3s ease;
        }

        /* Clean Digits (The fix you requested) */
        .money-digits {
            font-family: 'Inter', sans-serif;
            font-weight: 300; /* Slim & Pro */
            letter-spacing: -1px;
        }

        .btn-action {
            background: var(--aqua);
            color: #000;
            font-family: 'Syncopate', sans-serif;
            font-weight: 700;
            font-size: 10px;
            letter-spacing: 2px;
            transition: all 0.3s ease;
        }
        .btn-action:active { transform: scale(0.96); filter: brightness(1.2); }

        /* Animation for numbers */
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        .fade-in { animation: fadeIn 0.8s ease-out forwards; }
    </style>
</head>
<body class="p-6">

    <main class="max-w-md mx-auto space-y-6 pt-8">


        <nav class="sticky top-0 z-[1000] px-6 py-5 flex justify-between items-center bg-[#020617]/90 backdrop-blur-xl border-b border-white/5">
    <div class="flex items-center gap-4">
        <!-- Back Button connected to Dashboard -->
        <a href="dashboard.html" class="w-9 h-9 flex items-center justify-center rounded-lg bg-white/5 border border-white/10 hover:border-cyan-500/50 transition-all group">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class="text-gray-400 group-hover:text-cyan-400">
                <line x1="19" y1="12" x2="5" y2="12"></line>
                <polyline points="12 19 5 12 12 5"></polyline>
            </svg>
        </a>
        
        <!-- Professional Name in Single Line -->
        <h1 class="orbitron text-[12px] text-cyan-400 font-bold tracking-[4px] whitespace-nowrap">Quantum Ledger</h1>
    </div>

    <!-- Minimalist Status Dot -->
    <div class="flex items-center gap-2 px-3 py-1.5 rounded-full bg-cyan-500/5 border border-cyan-500/10">
        <div class="w-1.5 h-1.5 rounded-full bg-cyan-500 animate-pulse"></div>
        <span class="text-[8px] orbitron text-cyan-500/80 tracking-[2px]">Live</span>
    </div>
        </nav>

        <!-- 1. MAIN EQUITY CARD (The Star) -->
        <section class="master-card rounded-[32px] p-8 text-center fade-in">
            <p class="orbitron text-[8px] text-gray-500 mb-3">Available Equity</p>
            
            <h1 class="money-digits text-[42px] text-white leading-none mb-4">
                <span class="text-gray-500 text-2xl">₦</span>2,850<span class="text-gray-500 text-2xl">.00</span>
            </h1>

            <div class="flex justify-center items-center gap-2 mb-8">
                <div class="w-1 h-1 rounded-full bg-cyan-400 animate-pulse"></div>
                <span class="orbitron text-[7px] text-cyan-400">Node Verified</span>
            </div>

            <button class="w-full py-4 rounded-xl btn-action">
                Initiate Withdrawal
            </button>
        </section>

        <!-- 2. METRICS GRID -->
        <section class="grid grid-cols-2 gap-4 fade-in" style="animation-delay: 0.2s;">
            <div class="master-card rounded-[24px] p-5">
                <p class="orbitron text-[7px] text-gray-500 mb-2">Total Earned</p>
                <h4 class="money-digits text-xl text-white">₦15,400</h4>
            </div>
            <div class="master-card rounded-[24px] p-5">
                <p class="orbitron text-[7px] text-gray-500 mb-2">Withdrawn</p>
                <h4 class="money-digits text-xl text-white">₦12,550</h4>
            </div>
        </section>

        <!-- 3. TRANSACTION LIST -->
        <section class="master-card rounded-[30px] p-7 fade-in" style="animation-delay: 0.4s;">
            <div class="flex justify-between items-center mb-6">
                <h3 class="orbitron text-[9px] text-cyan-500">History</h3>
                <span class="text-[8px] text-gray-600 orbitron">Secure Ledger</span>
            </div>
            
            <div class="space-y-4">
                <!-- Transaction Item -->
                <div class="flex justify-between items-center py-3 border-b border-white/[0.03]">
                    <div>
                        <p class="text-[12px] font-medium text-gray-200">Asset Transfer</p>
                        <p class="text-[9px] text-gray-500 uppercase tracking-tighter">15 Mar 2026</p>
                    </div>
                    <div class="text-right">
                        <p class="money-digits text-[13px] text-red-400">-₦5,000</p>
                        <p class="orbitron text-[6px] text-green-500">Confirmed</p>
                    </div>
                </div>

                <!-- Transaction Item -->
                <div class="flex justify-between items-center py-3">
                    <div>
                        <p class="text-[12px] font-medium text-gray-200">Protocol Yield</p>
                        <p class="text-[9px] text-gray-500 uppercase tracking-tighter">14 Mar 2026</p>
                    </div>
                    <div class="text-right">
                        <p class="money-digits text-[13px] text-green-400">+₦150</p>
                        <p class="orbitron text-[6px] text-gray-600">Settled</p>
                    </div>
                </div>
            </div>
        </section>

    </main>

</body>
</html>
