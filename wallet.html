<!DOCTYPE html>
<html lang="ha">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@400;700&family=Inter:wght@100;200;300;400&family=Space+Grotesk:wght@300;400&family=JetBrains+Mono:wght@300;400&family=Outfit:wght@200;300&family=Kanit:wght@200;300&family=Rajdhani:wght@300&family=Roboto+Mono:wght@300&family=Public+Sans:wght@200;300&family=Lexend:wght@200;300&family=Manrope:wght@200;300&family=Plus+Jakarta+Sans:wght@200;300&family=Sora:wght@200;300&display=swap" rel="stylesheet">
    <title>SYNERGY PROTOCOL | SECURE VAULT</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --aqua: #00f2fe; --purple: #7000ff; --bg: #020617; }
        
        body { 
            background: var(--bg); 
            color: #fff; 
            font-family: 'Inter', sans-serif; 
            background-image: radial-gradient(circle at 50% 50%, rgba(112, 0, 255, 0.1), transparent), url('https://www.transparenttextures.com/patterns/carbon-fibre.png'); 
            min-height: 100vh;
            margin: 0;
            padding: 0;
        }

        .orbitron { font-family: 'Syncopate', sans-serif; text-transform: uppercase; }

        /* Smooth Header */
        nav {
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.5);
            width: 100%;
        }
        
        .master-card {
            background: rgba(255, 255, 255, 0.015);
            backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.04);
            border-top: 1px solid rgba(0, 242, 254, 0.2);
        }

        /* WANNAN SHINE MASTER LIST DIN DIGITS DINKA */

/* 1. THE APPLE LOOK (Inter Thin) - Mafi kyau ga kudi */
.digits-apple { font-family: 'Inter', sans-serif; font-weight: 200; letter-spacing: -2px; }

/* 2. THE CRYPTO (Space Grotesk) */
.digits-crypto { font-family: 'Space Grotesk', sans-serif; font-weight: 300; letter-spacing: -1px; }

/* 3. THE DEVELOPER (JetBrains Mono) */
.digits-mono { font-family: 'JetBrains Mono', monospace; font-weight: 300; }

/* 4. THE LUXURY (Outfit) */
.digits-luxury { font-family: 'Outfit', sans-serif; font-weight: 200; letter-spacing: -1px; }

/* 5. THE MODERN (Plus Jakarta Sans) */
.digits-jakarta { font-family: 'Plus Jakarta Sans', sans-serif; font-weight: 200; }

/* 6. THE NEUMORPHIC (Sora) */
.digits-sora { font-family: 'Sora', sans-serif; font-weight: 200; }

/* 7. THE HI-TECH (Rajdhani) */
.digits-tech { font-family: 'Rajdhani', sans-serif; font-weight: 400; text-transform: uppercase; }

/* 8. THE BANKER (Manrope) */
.digits-banker { font-family: 'Manrope', sans-serif; font-weight: 200; letter-spacing: -1px; }

/* 9. THE MINIMAL (Public Sans) */
.digits-minimal { font-family: 'Public Sans', sans-serif; font-weight: 200; }

/* 10. THE SOFT (Lexend) - Yana da dadi a ido */
.digits-soft { font-family: 'Lexend', sans-serif; font-weight: 200; }

/* 11. THE TERMINAL (Roboto Mono) */
.digits-terminal { font-family: 'Roboto Mono', monospace; font-weight: 300; color: #00f2fe; }

/* 12. THE BOLD THIN (Kanit) */
.digits-kanit { font-family: 'Kanit', sans-serif; font-weight: 200; font-style: italic; }
        

        .btn-action {
            background: var(--aqua);
            color: #000;
            font-family: 'Syncopate', sans-serif;
            font-weight: 700;
            font-size: 10px;
            letter-spacing: 2px;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        .fade-in { animation: fadeIn 0.8s ease-out forwards; }
    </style>
</head>
<body>

    <!-- Header: Gyararre (Slim & Edge-to-Edge) -->
    <nav class="sticky top-0 z-[1000] px-5 py-3 flex justify-between items-center bg-[#020617]/80 backdrop-blur-xl border-b border-white/5">
        <div class="flex items-center gap-3">
            <a href="dashboard.html" class="w-9 h-9 flex items-center justify-center rounded-lg bg-white/5 border border-white/10">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
            </a>
            <div>
                <h1 class="orbitron text-[10px] text-cyan-500 tracking-[3px] leading-none">Quantum Ledger</h1>
                <p class="text-[7px] text-gray-500 uppercase mt-1 tracking-[1px]">Secure Protocol V3</p>
            </div>
        </div>

        <div class="flex items-center gap-2 px-3 py-1 rounded-full bg-cyan-500/5 border border-cyan-500/20">
            <div class="w-1 h-1 rounded-full bg-cyan-500 animate-pulse"></div>
            <span class="text-[8px] orbitron text-cyan-500 font-bold">Encrypted</span>
        </div>
    </nav>

    <!-- Main Content: Added padding and spacing -->
    <main class="p-6 max-w-md mx-auto space-y-6">
    
        <!-- 1. MAIN EQUITY CARD -->
        <section class="master-card rounded-[32px] p-8 text-center fade-in">
            <p class="orbitron text-[8px] text-gray-500 mb-3">Available Equity</p>
            <h1 class="digits-tech text-[42px] text-white leading-none mb-4">
                <span class="text-gray-500 text-2xl">₦</span>2,850<span class="text-gray-500 text-2xl">.00</span>
            </h1>
            <div class="flex justify-center items-center gap-2 mb-8">
                <div class="w-1 h-1 rounded-full bg-cyan-400 animate-pulse"></div>
                <span class="orbitron text-[7px] text-cyan-400">Node Verified</span>
            </div>
            <button class="w-full py-4 rounded-xl btn-action">Initiate Withdrawal</button>
        </section>

        <!-- 2. METRICS GRID -->
        <section class="grid grid-cols-2 gap-4 fade-in" style="animation-delay: 0.2s;">
            <div class="master-card rounded-[24px] p-5">
                <p class="orbitron text-[7px] text-gray-500 mb-2">Total Earned</p>
                <h4 class="money-digits text-xl text-white">₦15,400</h4>
            </div>
            <div class="master-card rounded-[24px] p-5">
                <p class="orbitron text-[7px] text-gray-500 mb-2">Withdrawn</p>
                <h4 class="money-digits text-xl text-white">₦12,550</h4>
            </div>
        </section>

        <!-- 3. TRANSACTION LIST -->
        <section class="master-card rounded-[30px] p-7 fade-in" style="animation-delay: 0.4s;">
            <div class="flex justify-between items-center mb-6">
                <h3 class="orbitron text-[9px] text-cyan-500">History</h3>
                <span class="text-[8px] text-gray-600 orbitron">Secure Ledger</span>
            </div>
            
            <div class="space-y-4">
                <div class="flex justify-between items-center py-3 border-b border-white/[0.03]">
                    <div>
                        <p class="text-[12px] font-medium text-gray-200">Asset Transfer</p>
                        <p class="text-[9px] text-gray-500 uppercase">15 Mar 2026</p>
                    </div>
                    <div class="text-right">
                        <p class="money-digits text-[13px] text-red-400">-₦5,000</p>
                        <p class="orbitron text-[6px] text-green-500">Confirmed</p>
                    </div>
                </div>

                <div class="flex justify-between items-center py-3">
                    <div>
                        <p class="text-[12px] font-medium text-gray-200">Protocol Yield</p>
                        <p class="text-[9px] text-gray-500 uppercase">14 Mar 2026</p>
                    </div>
                    <div class="text-right">
                        <p class="money-digits text-[13px] text-green-400">+₦150</p>
                        <p class="orbitron text-[6px] text-gray-600">Settled</p>
                    </div>
                </div>
            </div>
        </section>

    </main>
</body>
    </html>
