<!DOCTYPE html>
<html lang="ha">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SYNERGY PROTOCOL | SECURE VAULT</title>
    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@400;700&family=Space+Grotesk:wght@300;500;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --aqua: #00f2fe; --purple: #7000ff; --bg: #020617; }
        body { 
            background: var(--bg); 
            color: #fff; 
            font-family: 'Space Grotesk', sans-serif; 
            overflow-x: hidden; 
            background-image: radial-gradient(circle at 50% 50%, rgba(112, 0, 255, 0.15), transparent), url('https://www.transparenttextures.com/patterns/carbon-fibre.png'); 
            min-height: 100vh; 
        }
        .glass-premium { 
            background: rgba(255, 255, 255, 0.02); 
            backdrop-filter: blur(40px) saturate(180%); 
            border: 1px solid rgba(255, 255, 255, 0.08); 
            border-top: 1px solid rgba(0, 242, 254, 0.3); 
        }
        .orbitron { font-family: 'Syncopate', sans-serif; text-transform: uppercase; letter-spacing: 3px; }
        main { padding-bottom: 150px; }

        .btn-withdraw {
            background: linear-gradient(90deg, #00f2fe, #7000ff);
            box-shadow: 0 0 20px rgba(0, 242, 254, 0.3);
            transition: all 0.5s ease;
        }
        .btn-withdraw:hover { transform: scale(1.02); box-shadow: 0 0 40px rgba(0, 242, 254, 0.5); }
 

.orbitron { 
    font-family: 'Syncopate', sans-serif; 
    text-transform: uppercase; 
    letter-spacing: 4px; 
            }
      

/* Wannan zai ba header din kalar 'Cyber' mai sanyi */
nav {
    box-shadow: 0 4px 30px rgba(0, 0, 0, 0.5);
}
        
        
    </style>
</head>
<body>


<!-- Main Balance Section: Ultra-Minimalist & High-End -->
<section class="rounded-[32px] p-8 text-center" style="background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.03); backdrop-filter: blur(20px);">
    
    <!-- Label: Very small and spaced out -->
    <p style="font-family: 'Syncopate', sans-serif; font-[400]; font-size: 8px; color: #4b5563; letter-spacing: 5px; margin-bottom: 12px;">AVAILABLE EQUITY</p>
    
    <!-- Balance: Slim, Clean, and Elegant (No Bold, No Glow) -->
    <h1 style="font-family: 'Inter', sans-serif; font-weight: 300; font-size: 32px; color: #ffffff; letter-spacing: -1px; margin-bottom: 8px;">
        ₦2,850<span style="color: #4b5563; font-weight: 200;">.00</span>
    </h1>

    <!-- Verified Badge: Simple Dot & Text -->
    <div class="flex justify-center items-center gap-2 mb-8">
        <div class="w-1 h-1 rounded-full bg-cyan-500 shadow-[0_0_5px_#00f2fe]"></div>
        <span style="font-family: 'Syncopate', sans-serif; font-[700]; font-size: 7px; color: #00f2fe; letter-spacing: 2px;">NODE VERIFIED</span>
    </div>

    <!-- Button: Professional solid look, not too big -->
    <button class="w-full py-4 rounded-xl font-bold uppercase tracking-[2px]" style="background: #00f2fe; color: #000; font-family: 'Syncopate', sans-serif; font-size: 10px; box-shadow: 0 4px 20px rgba(0, 242, 254, 0.15);">
        Initiate Withdrawal
    </button>
    
</section>
    
        

        <section class="grid grid-cols-2 gap-4">
            <div class="glass-premium p-6 rounded-[35px] border-l-2 border-l-cyan-500/30">
                <p class="orbitron text-[8px] text-gray-500 mb-2">Total Earned</p>
                <h4 class="text-xl font-bold text-white">₦15,400</h4>
            </div>
            <div class="glass-premium p-6 rounded-[35px] border-l-2 border-l-purple-500/30">
                <p class="orbitron text-[8px] text-gray-500 mb-2">Total Withdrawn</p>
                <h4 class="text-xl font-bold text-white">₦12,550</h4>
            </div>
        </section>

        <section class="glass-premium p-8 rounded-[40px] space-y-6">
            <h3 class="orbitron text-[10px] text-cyan-400 tracking-[4px]">Transaction History</h3>
            
            <div class="space-y-4">
                <div class="flex justify-between items-center p-4 bg-white/5 rounded-2xl border border-white/5">
                    <div>
                        <p class="text-xs font-bold text-white">Bank Transfer</p>
                        <p class="text-[9px] text-gray-500 uppercase">March 15, 2026</p>
                    </div>
                    <div class="text-right">
                        <p class="text-sm font-bold text-red-400">-₦5,000</p>
                        <p class="text-[8px] text-green-500 orbitron">Success</p>
                    </div>
                </div>

                <div class="flex justify-between items-center p-4 bg-white/5 rounded-2xl border border-white/5 opacity-60">
                    <div>
                        <p class="text-xs font-bold text-white">Daily Yield</p>
                        <p class="text-[9px] text-gray-500 uppercase">March 14, 2026</p>
                    </div>
                    <div class="text-right">
                        <p class="text-sm font-bold text-green-400">+₦150</p>
                        <p class="text-[8px] text-gray-500 orbitron">Credit</p>
                    </div>
                </div>
            </div>
        </section>

    </main>
</body>
          </html>
