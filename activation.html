    <script>

        
        // 2. CONGESTION CONTROL LOGIC (The "Leader" Strategy)
        async function checkSystemCapacity() {
            const today = new Date().toLocaleDateString('en-GB', { timeZone: 'Africa/Lagos' });
            const capacityRef = db.collection("system_stats").doc("daily_limit");

            const doc = await capacityRef.get();
            let limitData = doc.data();

            // Idan sabuwar rana ce, saita Random Limit (Tsakanin 20 zuwa 45)
            if (!limitData || limitData.date !== today) {
                const randomLimit = Math.floor(Math.random() * (45 - 20 + 1)) + 20;
                await capacityRef.set({ date: today, count: 0, limit: randomLimit });
                limitData = { count: 0, limit: randomLimit };
            }

            if (limitData.count >= limitData.limit) {
                document.getElementById('congestion-shutter').style.display = 'flex';
                document.getElementById('main-content').style.display = 'none';
            }
        }
        checkSystemCapacity();

        let player, activeNode = 0, currentCode = "", timerInterval;

        function onYouTubeIframeAPIReady() {
            player = new YT.Player('activation-player', {
                height: '100%', width: '100%',
                playerVars: { 'controls': 0, 'disablekb': 1, 'modestbranding': 1 },
                events: { 'onStateChange': onPlayerStateChange }
            });
        }

        function launchActivation(num, vid) {
            activeNode = num;
            document.getElementById('nodes-list').classList.add('hidden');
            document.getElementById('player-area').classList.remove('hidden');
            player.loadVideoById(vid);
            player.playVideo();
        }

        function onPlayerStateChange(event) {
            if(event.data === YT.PlayerState.PLAYING) {
                let timeLeft = 120; // 2 Mins
                clearInterval(timerInterval);
                timerInterval = setInterval(() => {
                    timeLeft--;
                    let m = Math.floor(timeLeft/60), s = timeLeft%60;
                    document.getElementById('timer-display').innerText = `${m}:${s<10?'0'+s:s}`;
