<!DOCTYPE html>
<html lang="ha">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SYNERGY | NODES ACTIVATION</title>
    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@400;700&family=Space+Grotesk:wght@300;500;700&family=Roboto+Mono:wght@400;500&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <style>
        :root { --aqua: #00f2fe; --bg: #020617; }
        body { 
            background: var(--bg); color: #fff; font-family: 'Space Grotesk', sans-serif; 
            background-image: radial-gradient(circle at 50% 50%, rgba(112, 0, 255, 0.1), transparent), url('https://www.transparenttextures.com/patterns/carbon-fibre.png');
            min-height: 100vh;
        }
        .glass-premium { background: rgba(255, 255, 255, 0.02); backdrop-filter: blur(40px); border: 1px solid rgba(255, 255, 255, 0.08); border-top: 1px solid rgba(0, 242, 254, 0.2); }
        .orbitron { font-family: 'Syncopate', sans-serif; text-transform: uppercase; letter-spacing: 3px; }
        .digits-terminal { font-family: 'Roboto Mono', monospace; }
        
        /* Neon Button & Effects */
        .btn-neon { background: linear-gradient(90deg, #00f2fe 0%, #7000ff 100%); transition: all 0.4s; }
        .btn-neon:hover { box-shadow: 0 0 20px rgba(0, 242, 254, 0.4); transform: translateY(-2px); }
        .node-card { transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1); }
        .node-locked { opacity: 0.3; filter: grayscale(1); pointer-events: none; }
        
        /* Shutter for Congestion */
        #congestion-shutter {
            position: fixed; inset: 0; background: var(--bg); z-index: 20000;
            display: none; flex-direction: column; align-items: center; justify-content: center;
            text-align: center; padding: 20px;
        }
    </style>
</head>
<body class="p-6">

    <div id="congestion-shutter">
        <div class="w-20 h-20 border-2 border-dashed border-red-500 rounded-full flex items-center justify-center animate-spin mb-6">
            <div class="w-4 h-4 bg-red-500 rounded-full"></div>
        </div>
        <h1 class="orbitron text-red-500 text-lg mb-4">Node Saturation Reached</h1>
        <p class="text-gray-400 text-sm max-w-xs">A yau protocol ya riga ya dauki adadin da yake bukata don kariya. Da fatan zaka dawo nan da awanni 24.</p>
        <button onclick="location.href='dashboard.html'" class="mt-8 px-8 py-3 glass-premium rounded-full orbitron text-[10px]">Return to Vault</button>
    </div>

    <main id="main-content" class="max-w-xl mx-auto space-y-8 mt-10">
        <div class="text-center space-y-4">
            <div class="w-12 h-12 rounded-full border border-cyan-500/30 mx-auto flex items-center justify-center">
                <div class="w-2 h-2 bg-cyan-500 rounded-full shadow-[0_0_15px_#00f2fe]"></div>
            </div>
            <h1 class="orbitron text-sm font-bold tracking-[6px]">System Activation</h1>
            <p class="text-[10px] text-gray-500 uppercase tracking-[2px]">Verify 5 nodes to unlock permanent yield</p>
        </div>

        <div class="glass-premium p-6 rounded-[32px] border-b-2 border-cyan-500/20">
            <div class="flex justify-between items-center mb-4">
                <span class="orbitron text-[9px] text-gray-400">Node Synchronization</span>
                <span id="nodes-count" class="digits-terminal text-cyan-400 text-lg">0 / 5</span>
            </div>
            <div class="h-1 w-full bg-white/5 rounded-full">
                <div id="progress-bar" class="h-full bg-cyan-500 rounded-full transition-all duration-700" style="width: 0%"></div>
            </div>
        </div>

        <div id="player-area" class="hidden space-y-6">
            <div class="aspect-video glass-premium rounded-[30px] overflow-hidden relative">
                <div id="activation-player"></div>
            </div>
            <div class="text-center space-y-4">
                <div id="timer-display" class="digits-terminal text-4xl text-white">02:00</div>
                <div id="verify-ui" class="hidden space-y-4 animate-in fade-in duration-500">
                    <input type="text" id="hash-input" class="w-full bg-white/5 border border-white/10 rounded-2xl p-4 text-center digits-terminal text-xl outline-none focus:border-cyan-500" placeholder="ENTER CODE">
                    <button onclick="confirmNodeActivation()" class="w-full btn-neon text-white py-4 rounded-2xl orbitron text-[11px] font-bold">Secure Node</button>
                </div>
            </div>
        </div>

        <div id="nodes-list" class="space-y-4">
            <div id="node-1" class="node-card glass-premium p-6 rounded-[30px]">
                <div class="flex items-center justify-between">
                    <div class="flex items-center gap-4">
                        <div class="w-12 h-12 bg-red-600/10 rounded-2xl border border-red-500/20 flex items-center justify-center">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="red"><path d="M23.5 6.2c-.3-1.1-1.1-1.9-2.1-2.2C19.5 3.5 12 3.5 12 3.5s-7.5 0-9.4.5c-1 .3-1.8 1.1-2.1 2.2C0 8.1 0 12 0 12s0 3.9.5 5.8c.3 1.1 1.1 1.9 2.1 2.2 1.9.5 9.4.5 9.4.5s7.5 0 9.4-.5c1-.3 1.8-1.1 2.1-2.2.5-1.9.5-5.8.5-5.8s0-3.9-.5-5.8zM9.5 15.5V8.5l6.3 3.5-6.3 3.5z"/></svg>
                        </div>
                        <div>
                            <h4 class="orbitron text-[11px] text-white">Node: Nexus AI</h4>
                            <p class="text-[9px] text-gray-500">Status: Offline</p>
                        </div>
                    </div>
                    <button onclick="launchActivation(1, 'VIDEO_ID_1')" class="px-5 py-2 rounded-xl bg-white text-black orbitron text-[9px] font-bold">Initialize</button>
                </div>
            </div>
            </div>
    </main>

     
<script src="https://www.youtube.com/iframe_api"></script>
<script>
    // 1. FIREBASE & AUTH (An riga an saka Config dinka na gaskiya)
    const firebaseConfig = { 
        apiKey: "AIzaSyDLTwLq8Le9vYAwRkRcqXPGxFnEqW1yE2E", 
        authDomain: "synergy-protocol.firebaseapp.com", 
        projectId: "synergy-protocol", 
        storageBucket: "synergy-protocol.firebasestorage.app", 
        messagingSenderId: "179647543031", 
        appId: "1:179647543031:web:388da8a36e1bbbb55d85f2" 
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const currentUser = localStorage.getItem('synergy_user');

    let player, activeNode = 0, currentCode = "", timerInterval;

    // 2. CONGESTION CONTROL (Logic din Random 0)
    async function checkSystemCapacity() {
        const today = new Date().toLocaleDateString('en-GB', { timeZone: 'Africa/Lagos' });
        const capacityRef = db.collection("system_stats").doc("daily_limit");

        try {
            const doc = await capacityRef.get();
            let limitData = doc.data();

            if (!limitData || limitData.date !== today) {
                let rawLimit = Math.floor(Math.random() * 46); 
                let newLimit = (rawLimit < 7) ? 0 : rawLimit;
                await capacityRef.set({ date: today, count: 0, limit: newLimit });
                limitData = { count: 0, limit: newLimit, date: today };
            }

            const shutter = document.getElementById('congestion-shutter');
            const main = document.getElementById('main-content');

            if (limitData.limit === 0) {
                shutter.style.display = 'flex';
                main.style.display = 'none';
                shutter.querySelector('p').innerText = "SYSTEM STATUS: All nodes are currently offline for protocol synchronization. Return in 24h.";
            } else if (limitData.count >= limitData.limit) {
                shutter.style.display = 'flex';
                main.style.display = 'none';
                shutter.querySelector('p').innerText = "NODE SATURATION: Maximum daily capacity reached. Secure synchronization is closed until tomorrow.";
            }
        } catch (e) { console.error("Capacity Check Error", e); }
    }
    checkSystemCapacity();

    // --- 3. HYBRID YOUTUBE VERIFICATION (API + WATCH TIME) ---
const API_KEY = 'AIzaSyDqgyMq1NF4s0Q_-raMVdAOxBvCmeTxKYQ';
const channels = {
    1: { id: 'UC6NlJ4k7Jitn0Gj3o4R-x3A', handle: '@aiwealthacademy_global', vid: 'Daga_cikin_vidiyonka' }, // Saka Video ID anan
    2: { id: 'UCmYv0pD4fH2kXz9vjU8BvXg', handle: '@globalwealthsecrethq', vid: 'Daga_cikin_vidiyonka' }  // Saka Video ID anan
};

function onYouTubeIframeAPIReady() {
    player = new YT.Player('activation-player', {
        height: '100%', width: '100%',
        playerVars: { 'controls': 0, 'disablekb': 1, 'modestbranding': 1, 'rel': 0 },
        events: { 'onStateChange': onPlayerStateChange }
    });
}

function launchActivation(num) {
    activeNode = num;
    const channel = channels[num];
    if(!channel) return;

    document.getElementById('nodes-list').classList.add('hidden');
    document.getElementById('player-area').classList.remove('hidden');
    player.loadVideoById(channel.vid);
    player.playVideo();
}

function onPlayerStateChange(event) {
    if(event.data === YT.PlayerState.PLAYING) {
        let timeLeft = 120; // 2 Minutes Watch Time
        clearInterval(timerInterval);
        timerInterval = setInterval(() => {
            timeLeft--;
            let m = Math.floor(timeLeft/60), s = timeLeft%60;
            document.getElementById('timer-display').innerText = `${m}:${s<10?'0'+s:s}`;
            
            if(timeLeft <= 0) {
                clearInterval(timerInterval);
                showSubscribeStep();
            }
        }, 1000);
    }
}

function showSubscribeStep() {
    const verifyUI = document.getElementById('verify-ui');
    verifyUI.innerHTML = `
        <div style="text-align:center; padding:20px;">
            <p style="color:#00ffcc; font-weight:bold;">WATCH TIME COMPLETE!</p>
            <p>Final Step: Subscribe to Secure Node ${activeNode}</p>
            <button onclick="finalVerification()" class="btn-neon" style="padding:10px 20px; cursor:pointer;">SUBSCRIBE & GET CODE</button>
        </div>
    `;
    verifyUI.classList.remove('hidden');
}

async function finalVerification() {
    const channel = channels[activeNode];
    // Kai mutum ya yi subscribe
    window.open(`https://youtube.com/${channel.handle}?sub_confirmation=1`, '_blank');

    // Bayan ya dawo, nuna masa Verification Code
    setTimeout(() => {
        currentCode = Math.random().toString(36).substring(2,8).toUpperCase();
        const verifyUI = document.getElementById('verify-ui');
        verifyUI.innerHTML = `
            <input type="text" id="hash-input" placeholder="CODE: ${currentCode}" style="background:rgba(0,0,0,0.5); color:#fff; border:1px solid #00ffcc; padding:10px; text-align:center;">
            <button onclick="confirmNodeActivation()" class="btn-neon" style="margin-top:10px; padding:10px 20px;">CONFIRM NODE</button>
        `;
    }, 3000);
}

async function confirmNodeActivation() {
    const val = document.getElementById('hash-input').value.toUpperCase();
    if(val === currentCode && currentCode !== "") {
        let countSpan = document.getElementById('nodes-count');
        let totalNodes = 2; // Canza zuwa 5 idan ka kara wasu channels din
        let currentNodes = parseInt(countSpan.innerText.split(' / ')[0]) + 1;
        
        countSpan.innerText = currentNodes + " / " + totalNodes;
        document.getElementById('progress-bar').style.width = (currentNodes * (100/totalNodes)) + "%";

        if(currentNodes === totalNodes) {
            await db.collection("users").doc(currentUser).update({ isVerified: true });
            await db.collection("system_stats").doc("daily_limit").update({
                count: firebase.firestore.FieldValue.increment(1)
            });
            alert("PROTOCOL ACTIVATED! Redirecting to Secure Vault...");
            location.href = "dashboard.html";
        } else {
            document.getElementById('verify-ui').classList.add('hidden');
            document.getElementById('player-area').classList.add('hidden');
            document.getElementById('nodes-list').classList.remove('hidden');
            currentCode = "";
            alert("Node Secure. Proceed to next synchronization.");
        }
    } else {
        alert("INVALID HASH. Node security failed.");
    }
    }
                
</script>
    
        
</body>
    </html>
