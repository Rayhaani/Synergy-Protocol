<div id="customNodeModal" class="synergy-modal font-space" style="display: none;">

    <script>
        
        <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

<script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

<script>
    // 1. INITIALIZE FIREBASE
    const firebaseConfig = { 
        apiKey: "AIzaSyDLTwLq8Le9vYAwRkRcqXPGxFnEqW1yE2E", 
        authDomain: "synergy-protocol.firebaseapp.com", 
        projectId: "synergy-protocol", 
        databaseURL: "https://synergy-protocol-default-rtdb.firebaseio.com", 
        storageBucket: "synergy-protocol.firebasestorage.app", 
        messagingSenderId: "179647543031", 
        appId: "1:179647543031:web:388da8a36e1bbbb55d85f2" 
    };
    
    if (!firebase.apps.length) {
        firebase.initializeApp(firebaseConfig);
    }
    
    const db = firebase.firestore();
    const database = firebase.database();

    // 2. TOGGLE MENU
    function toggleGoogleMenu(event) {
        event.stopPropagation();
        document.getElementById('google-nav').classList.toggle('active');
    }
    window.onclick = () => document.getElementById('google-nav').classList.remove('active');

    // 3. AUTH & LINK GENERATION (Wannan bangaren ne baya aiki)
    firebase.auth().onAuthStateChanged((user) => {
        if (user) {
            console.log("Mamba ya shigo:", user.email);
            // Nemo mamban ta Email
            db.collection("users").where("email", "==", user.email).get().then((querySnapshot) => {
                if (querySnapshot.empty) {
                    console.error("Ba a samu bayanan wannan email din a Firestore ba!");
                    document.getElementById('ref-link').value = "Profile Not Found";
                    return;
                }
                
                querySnapshot.forEach((doc) => {
                    const myUsername = doc.data().username;
                    const refInput = document.getElementById('ref-link');
                    const baseUrl = "https://rayhaani.github.io/Synergy/signup.html";
                    
                    // Saita Referral Link
                    refInput.value = `${baseUrl}?ref=${myUsername}`;
                    
                    // MUHIMMI: Loda network din mamban nan take
                    loadReferralNetwork(myUsername);
                });
            }).catch(err => console.error("Error fetching user:", err));
        } else {
            window.location.href = "signin.html";
        }
    });


    // 4. LOAD REFERRAL NETWORK (GYARARRE)
function loadReferralNetwork(currentUsername) {
    const listBody = document.getElementById('referral-list-body');
    const topActiveCount = document.getElementById('active-count-top');
    const refCountHeader = document.getElementById('ref-count');

    db.collection("users").where("referredBy", "==", currentUsername)
    .onSnapshot((querySnapshot) => {
        listBody.innerHTML = "";
        let activeCount = 0;
        let totalRefs = 0;

        if (querySnapshot.empty) {
            listBody.innerHTML = '<tr><td colspan="3" class="text-center py-10 opacity-50 font-space text-[11px]">No nodes found.</td></tr>';
            topActiveCount.innerText = "0";
            refCountHeader.innerText = "0";
            return;
        }

        const today = new Date().toLocaleDateString('en-GB'); // Zai dauki kwanan yau kai tsaye

        querySnapshot.forEach((doc) => {
            const data = doc.data();
            totalRefs++;
            
            const lastDate = data.lastActivityDate || "N/A";
            const isActive = (lastDate === today);
            if(isActive) activeCount++;

           listBody.innerHTML += `
    <tr class="text-[13px] font-space border-b border-white/[0.03] hover:bg-white/[0.01] cursor-pointer" 
        onclick="openNodeVault('${data.fullName || 'N/A'}', '${data.username}', '${data.phoneNumber || ''}', '${data.email || 'N/A'}', '${(data.videoBalance || 0) + (data.shareBalance || 0)}')">
        <td class="py-5 text-white">
            <div class="flex flex-col">
                <span class="font-medium text-cyan-400">@${data.username.charAt(0).toUpperCase() + data.username.slice(1).toLowerCase()}</span>
                <span class="text-[9px] text-gray-500 tracking-wide">View details</span>
            </div>
        </td>
        <td class="py-5 text-center">
            <span class="${isActive ? 'text-green-400' : 'text-red-400'} font-medium">
                ${isActive ? 'Active' : 'Inactive'}
            </span>
        </td>
        <td class="py-5 text-right text-gray-400 font-light">
            ${lastDate === today ? 'Today' : lastDate}
        </td>
    </tr>`;
            
        });
        
        topActiveCount.innerText = activeCount;
        refCountHeader.innerText = totalRefs;
    });
}
    
function openNodeVault(fullName, username, phone, email, balance) {
    const modal = document.getElementById('customNodeModal');
    // Saka bayanan tsakiya da Space Grotesk
    document.getElementById('modalBody').innerHTML = `
        <div class="flex flex-col items-center text-center space-y-4 font-space">
            <p class="text-white font-bold text-lg font-space">${fullName}</p>
            <p class="text-cyan-400 font-space">@${username}</p>
            <p class="text-white text-[11px] font-space">${email}</p>
            <p class="text-green-400 font-bold text-xl font-space">₦${Number(balance).toLocaleString()}</p>
        </div>
    `;
    modal.style.display = 'flex';

    // WhatsApp Action
    document.getElementById('waBtn').onclick = (e) => {
        e.preventDefault();
        if(!phone || phone === 'undefined') {
            alert("Babu lambar waya a database!");
            return;
        }
        let clean = String(phone).replace(/\D/g, '');
        if(clean.startsWith('0')) clean = '234' + clean.substring(1);
        window.open(`https://wa.me/${clean}`, '_blank');
    };
}
    

    
    // 5. COPY FUNCTION
    function copyRef() {
        const copyText = document.getElementById("ref-link");
        if (copyText.value === "Loading...") return;
        copyText.select();
        navigator.clipboard.writeText(copyText.value).then(() => showToast("LINK COPIED"));
    }

    function showToast(msg) {
        let toast = document.getElementById('synergy-toast') || document.createElement('div');
        toast.id = 'synergy-toast';
        toast.className = 'synergy-toast';
        document.body.appendChild(toast);
        toast.innerText = msg;
        toast.classList.add('show');
        setTimeout(() => toast.classList.remove('show'), 3000);
    }

    
</script>
