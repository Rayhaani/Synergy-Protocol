<!DOCTYPE html>
<html lang="ha">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SYNERGY PROTOCOL | NETWORK NODES</title>
    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@400;700&family=Space+Grotesk:wght@300;500;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <style>
        :root { --aqua: #00f2fe; --purple: #7000ff; --bg: #020617; }
        body { 
            background: var(--bg); color: #fff; font-family: 'Space Grotesk', sans-serif; 
            overflow-x: hidden; 
            background-image: radial-gradient(circle at 50% 50%, rgba(112, 0, 255, 0.15), transparent), url('https://www.transparenttextures.com/patterns/carbon-fibre.png'); 
            min-height: 100vh; 
        }
        .glass-premium { 
            background: rgba(255, 255, 255, 0.02); backdrop-filter: blur(40px) saturate(180%); 
            border: 1px solid rgba(255, 255, 255, 0.08); border-top: 1px solid rgba(0, 242, 254, 0.3); 
        }
        .orbitron { font-family: 'Syncopate', sans-serif; text-transform: uppercase; letter-spacing: 2px; }
        main { padding-bottom: 150px; }
        
        @keyframes slideUp { from { opacity: 0; transform: translateY(40px); } to { opacity: 1; transform: translateY(0); } }
        .animate-ui { animation: slideUp 1s cubic-bezier(0.19, 1, 0.22, 1) forwards; }

        .synergy-toast {
            position: fixed; top: -100px; left: 50%; transform: translateX(-50%);
            background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(15px);
            border: 1px solid var(--aqua); color: white; padding: 12px 25px;
            border-radius: 12px; z-index: 9999; transition: all 0.5s ease;
            font-family: 'Syncopate', sans-serif; font-size: 10px;
        }
        .synergy-toast.show { top: 30px; }

        /* Custom Scrollbar for the list */
        .custom-scroll::-webkit-scrollbar { width: 4px; }
        .custom-scroll::-webkit-scrollbar-track { background: transparent; }
        .custom-scroll::-webkit-scrollbar-thumb { background: rgba(0, 242, 254, 0.2); border-radius: 10px; }
    </style>
</head>
<body class="p-6">

    <main class="max-w-2xl mx-auto space-y-8 mt-16 animate-ui">
        
        <section class="glass-premium p-8 rounded-[40px] relative overflow-hidden text-center space-y-8">
            <h2 class="orbitron text-[12px] text-cyan-400 tracking-[6px] font-bold">NETWORK EXPANSION</h2>
            
            <div class="grid grid-cols-2 gap-4">
                <div class="bg-black/40 p-6 rounded-[30px] border border-white/5">
                    <p class="orbitron text-[8px] text-gray-500 mb-1">Total Referrals</p>
                    <h4 id="ref-count" class="text-3xl font-black text-white">0</h4>
                </div>
                <div class="bg-black/40 p-6 rounded-[30px] border border-white/5">
                    <p class="orbitron text-[8px] text-gray-500 mb-1">Active Nodes</p>
                    <h4 id="active-count-top" class="text-3xl font-black text-green-400">0</h4>
                </div>
            </div>

            <div class="space-y-4">
                <p class="orbitron text-[8px] text-gray-400 tracking-[3px]">YOUR UNIQUE NODE LINK</p>
                <div class="flex items-center gap-3 bg-black/60 p-4 rounded-2xl border border-cyan-500/20">
                    <input type="text" id="ref-link" readonly value="Loading..." 
                           class="bg-transparent text-[11px] text-cyan-300 w-full outline-none font-mono">
                    <button onclick="copyRef()" class="p-2 text-cyan-400 hover:scale-110 transition-transform">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>
                    </button>
                </div>
            </div>
        </section>

        <section class="glass-premium p-6 rounded-[40px] space-y-6">
            <div class="flex justify-between items-center px-2">
                <h3 class="orbitron text-[10px] text-gray-400 tracking-[3px]">Node Directory</h3>
                <span class="text-[9px] text-cyan-500 orbitron">Real-time Feed</span>
            </div>

            <div class="overflow-x-auto custom-scroll max-h-[400px]">
                <table class="w-full">
                    <thead class="sticky top-0 bg-[#020617] z-10">
                        <tr class="text-[9px] orbitron text-gray-500 border-b border-white/5">
                            <th class="text-left pb-4">Username</th>
                            <th class="text-center pb-4">Task Status</th>
                            <th class="text-right pb-4">Last Active</th>
                        </tr>
                    </thead>
                    <tbody id="referral-list-body" class="divide-y divide-white/[0.03]">
                        <tr>
                            <td colspan="3" class="text-center py-20 text-gray-600 text-[11px] italic">Initializing node scan...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </section>



        
            </button>
        </div>
    </div>
    </main>

    <script>
        const firebaseConfig = { 
            apiKey: "AIzaSyDLTwLq8Le9vYAwRkRcqXPGxFnEqW1yE2E", 
            authDomain: "synergy-protocol.firebaseapp.com", 
            projectId: "synergy-protocol", 
            storageBucket: "synergy-protocol.firebasestorage.app", 
            messagingSenderId: "179647543031", 
            appId: "1:179647543031:web:388da8a36e1bbbb55d85f2" 
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const testUser = "mamba_001";

        // Logic don gano referrals da nuna aikinsu
        function loadReferralNetwork() {
            const listBody = document.getElementById('referral-list-body');
            const topActiveCount = document.getElementById('active-count-top');

            db.collection("users").where("referredBy", "==", testUser)
            .onSnapshot((querySnapshot) => {
                listBody.innerHTML = "";
                let activeCount = 0;
                
                if (querySnapshot.empty) {
                    listBody.innerHTML = '<tr><td colspan="3" class="text-center py-20 text-gray-600 text-[11px]">No nodes linked to your protocol.</td></tr>';
                    return;
                }

                const today = new Date().toLocaleDateString('en-GB');

                querySnapshot.forEach((doc) => {
                    const data = doc.data();
                    const username = doc.id;
                    const lastDate = data.lastActivityDate || "N/A";
                    const progress = data.videosWatchedToday || 0;
                    
                    // Mutum ya zama active idan ya kalla 10/10 a yau
                    const isActive = (lastDate === today && progress >= 10);
                    if(isActive) activeCount++;

                    const row = `
                        <tr class="text-[11px]">
                            <td class="py-5 font-medium text-gray-300">@${username}</td>
                            <td class="py-5 text-center">
                                ${isActive ? 
                                    '<span class="text-green-400 font-bold bg-green-400/10 px-3 py-1 rounded-full border border-green-400/20">ACTIVE</span>' : 
                                    '<span class="text-red-400 opacity-60 bg-red-400/5 px-3 py-1 rounded-full">INACTIVE</span>'}
                            </td>
                            <td class="py-5 text-right font-mono ${lastDate === today ? 'text-cyan-400' : 'text-gray-500'}">
                                ${lastDate === today ? 'Today' : lastDate}
                            </td>
                        </tr>
                    `;
                    listBody.innerHTML += row;
                });

                topActiveCount.innerText = activeCount;
                document.getElementById('ref-count').innerText = querySnapshot.size;
            });
        }

        function syncNodeData() {
            db.collection("users").doc(testUser).onSnapshot((doc) => {
                if (doc.exists) {
                    document.getElementById('ref-link').value = `https://synergy-protocol.io/join?ref=${testUser}`;
                }
            });
        }

        // Initialize
        syncNodeData();
        loadReferralNetwork();

        function copyRef() {
            const copyText = document.getElementById("ref-link");
            copyText.select();
            navigator.clipboard.writeText(copyText.value);
            showToast("LINK COPIED TO CLIPBOARD");
        }

        function showToast(msg) {
            let toast = document.getElementById('synergy-toast');
            if(!toast) {
                toast = document.createElement('div');
                toast.id = 'synergy-toast';
                toast.className = 'synergy-toast';
                document.body.appendChild(toast);
            }
            toast.innerText = msg;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3000);
        }
    </script>
</body>
  </html>
