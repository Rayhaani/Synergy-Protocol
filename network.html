<!DOCTYPE html>
<html lang="ha">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SYNERGY PROTOCOL | NETWORK NODES</title>
    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@400;700&family=Space+Grotesk:wght@300;500;700&family=Plus+Jakarta+Sans:wght@400;500&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <style>
        :root { --aqua: #00f2fe; --purple: #7000ff; --bg: #020617; }
        body { 
            background: var(--bg); color: #fff; font-family: 'Space Grotesk', sans-serif; 
            overflow-x: hidden; 
            background-image: radial-gradient(circle at 50% 50%, rgba(112, 0, 255, 0.15), transparent), url('https://www.transparenttextures.com/patterns/carbon-fibre.png'); 
            min-height: 100vh; 
        }
        .glass-premium { 
            background: rgba(255, 255, 255, 0.02); backdrop-filter: blur(40px) saturate(180%); 
            border: 1px solid rgba(255, 255, 255, 0.08); border-top: 1px solid rgba(0, 242, 254, 0.3); 
        }
        .orbitron { font-family: 'Syncopate', sans-serif; text-transform: uppercase; letter-spacing: 2px; }
        main { padding-bottom: 150px; }
        
        @keyframes slideUp { from { opacity: 0; transform: translateY(40px); } to { opacity: 1; transform: translateY(0); } }
        .animate-ui { animation: slideUp 1s cubic-bezier(0.19, 1, 0.22, 1) forwards; }

        /* HEADER & POPUP STYLES - NAN NE GYARAN */
        .google-popup {
            position: absolute; top: 45px; right: 0; width: 180px;
            background: #151515; border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 16px; z-index: 10000; padding: 8px;
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.9);
            opacity: 0; transform: scale(0.9); pointer-events: none;
            transform-origin: top right;
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .google-popup.active { opacity: 1; transform: scale(1); pointer-events: auto; }
        .menu-item {
            display: flex; align-items: center; gap: 14px;
            padding: 12px 14px; border-radius: 10px;
            color: #efefef; font-size: 13px; font-weight: 500;
            font-family: 'Plus Jakarta Sans', sans-serif;
            transition: 0.2s; cursor: pointer;
        }
        .menu-item:hover { background: rgba(255, 255, 255, 0.08); }
        .menu-item svg { width: 16px; height: 16px; stroke: #888; fill: none; stroke-width: 2; }
        .menu-divider { height: 1px; background: rgba(255, 255, 255, 0.05); margin: 2px 0; }

        .synergy-toast {
            position: fixed; top: -100px; left: 50%; transform: translateX(-50%);
            background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(15px);
            border: 1px solid var(--aqua); color: white; padding: 12px 25px;
            border-radius: 12px; z-index: 9999; transition: all 0.5s ease;
            font-family: 'Syncopate', sans-serif; font-size: 10px;
        }
        .synergy-toast.show { top: 30px; }
        .custom-scroll::-webkit-scrollbar { width: 4px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: rgba(0, 242, 254, 0.2); border-radius: 10px; }
    </style>
</head>
<body>

    <!-- Header ya dawo asalin wurinsa a saman shafi -->
    <nav class="sticky top-0 z-[10000] p-5 flex justify-between items-center px-8 bg-[#0a0a0a] border-b border-cyan-900/20">
        <div class="flex items-center gap-3">
            <div class="w-8 h-8 rounded-full border-2 border-dashed border-cyan-500 flex items-center justify-center p-1">
                <div class="w-full h-full bg-cyan-500 rounded-full shadow-[0_0_15px_#00f2fe]"></div>
            </div>
            <h1 class="orbitron text-[13px] text-white font-bold tracking-[4px] whitespace-nowrap uppercase">Synergy Protocol</h1>
        </div>

        <div class="relative">
            <div class="menu-trigger cursor-pointer p-2 hover:bg-white/5 rounded-lg transition-all" onclick="toggleGoogleMenu(event)">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="1"></circle><circle cx="12" cy="5" r="1"></circle><circle cx="12" cy="19" r="1"></circle>
                </svg>
            </div>

            <div id="google-nav" class="google-popup">
                <div class="menu-item" onclick="location.href='dashboard.html'">
                    <svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7"></rect><rect x="14" y="3" width="7" height="7"></rect><rect x="14" y="14" width="7" height="7"></rect><rect x="3" y="14" width="7" height="7"></rect></svg>
                    <span>Dashboard</span>
                </div>
                <div class="menu-item" onclick="location.href='wallet.html'">
                    <svg viewBox="0 0 24 24"><path d="M20 12V8H4v4M20 12v4H4v-4M20 12H4M12 4v16"></path></svg>
                    <span>Wallet</span>
                </div>
                <div class="menu-item" onclick="location.href='network.html'">
                    <svg viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle><path d="M23 21v-2a4 4 0 0 0-3-3.87M16 3.13a4 4 0 0 1 0 7.75"></path></svg>
                    <span>Network</span>
                </div>
                <div class="menu-divider"></div>
                <div class="menu-item" onclick="location.href='security.html'">
                    <svg viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
                    <span>Security</span>
                </div>
            </div>
        </div>
    </nav>

    <main class="max-w-2xl mx-auto space-y-8 mt-10 animate-ui">
        <!-- Dashboard Cards -->
        <section
            <div class="master-card rounded-[35px] p-8 text-center border-t-2 border-cyan-500/30">
                  <h2 class="orbitron text-[12px] text-cyan-400 tracking-[6px] font-bold">NETWORK EXPANSION</h2>
            <div class="grid grid-cols-2 gap-4">
                <div class="bg-black/40 p-6 rounded-[30px] border border-white/5">
                    <p class="orbitron text-[8px] text-gray-500 mb-1">Total Referrals</p>
                    <h4 id="ref-count" class="text-3xl font-black text-white">0</h4>
                </div>
                <div class="bg-black/40 p-6 rounded-[30px] border border-white/5">
                    <p class="orbitron text-[8px] text-gray-500 mb-1">Active Nodes</p>
                    <h4 id="active-count-top" class="text-3xl font-black text-green-400">0</h4>
                </div>
            </div>
            <div class="space-y-4">
                <p class="orbitron text-[8px] text-gray-400 tracking-[3px]">YOUR UNIQUE NODE LINK</p>
                <div class="flex items-center gap-3 bg-black/60 p-4 rounded-2xl border border-cyan-500/20">
                    <input type="text" id="ref-link" readonly value="Loading..." class="bg-transparent text-[11px] text-cyan-300 w-full outline-none font-mono">
                    <button onclick="copyRef()" class="p-2 text-cyan-400 hover:scale-110 transition-transform">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>
                    </button>
                </div>
            </div>
        </section>

        <!-- Node Directory Table -->
        <section class="glass-premium p-6 rounded-[40px] space-y-6">
            <div class="flex justify-between items-center px-2">
                <h3 class="orbitron text-[10px] text-gray-400 tracking-[3px]">Node Directory</h3>
                <span class="text-[9px] text-cyan-500 orbitron">Real-time Feed</span>
            </div>
            <div class="overflow-x-auto custom-scroll max-h-[400px]">
                <table class="w-full">
                    <thead class="sticky top-0 bg-[#020617] z-10">
                        <tr class="text-[9px] orbitron text-gray-500 border-b border-white/5">
                            <th class="text-left pb-4">Username</th>
                            <th class="text-center pb-4">Task Status</th>
                            <th class="text-right pb-4">Last Active</th>
                        </tr>
                    </thead>
                    <tbody id="referral-list-body" class="divide-y divide-white/[0.03]">
                        <tr><td colspan="3" class="text-center py-20 text-gray-600 text-[11px] italic">Initializing node scan...</td></tr>
                    </tbody>
                </table>
            </div>
        </section>
    </main>

    <script>
        const firebaseConfig = { 
            apiKey: "AIzaSyDLTwLq8Le9vYAwRkRcqXPGxFnEqW1yE2E", 
            authDomain: "synergy-protocol.firebaseapp.com", 
            projectId: "synergy-protocol", 
            storageBucket: "synergy-protocol.firebasestorage.app", 
            messagingSenderId: "179647543031", 
            appId: "1:179647543031:web:388da8a36e1bbbb55d85f2" 
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const testUser = "mamba_001";

        // Logic don menu
        function toggleGoogleMenu(event) {
            event.stopPropagation();
            document.getElementById('google-nav').classList.toggle('active');
        }
        window.onclick = () => document.getElementById('google-nav').classList.remove('active');

        // Logic don referrals
        function loadReferralNetwork() {
            const listBody = document.getElementById('referral-list-body');
            const topActiveCount = document.getElementById('active-count-top');

            db.collection("users").where("referredBy", "==", testUser)
            .onSnapshot((querySnapshot) => {
                listBody.innerHTML = "";
                let activeCount = 0;
                if (querySnapshot.empty) {
                    listBody.innerHTML = '<tr><td colspan="3" class="text-center py-20 text-gray-600 text-[11px]">No nodes linked to your protocol.</td></tr>';
                    return;
                }
                const today = new Date().toLocaleDateString('en-GB');
                querySnapshot.forEach((doc) => {
                    const data = doc.data();
                    const username = doc.id;
                    const lastDate = data.lastActivityDate || "N/A";
                    const progress = data.videosWatchedToday || 0;
                    const isActive = (lastDate === today && progress >= 10);
                    if(isActive) activeCount++;
                    listBody.innerHTML += `
                        <tr class="text-[11px]">
                            <td class="py-5 font-medium text-gray-300">@${username}</td>
                            <td class="py-5 text-center">${isActive ? '<span class="text-green-400 font-bold bg-green-400/10 px-3 py-1 rounded-full">ACTIVE</span>' : '<span class="text-red-400 opacity-60 bg-red-400/5 px-3 py-1 rounded-full">INACTIVE</span>'}</td>
                            <td class="py-5 text-right font-mono ${lastDate === today ? 'text-cyan-400' : 'text-gray-500'}">${lastDate === today ? 'Today' : lastDate}</td>
                        </tr>`;
                });
                topActiveCount.innerText = activeCount;
                document.getElementById('ref-count').innerText = querySnapshot.size;
            });
        }

        function syncNodeData() {
            db.collection("users").doc(testUser).onSnapshot((doc) => {
                if (doc.exists) {
                    document.getElementById('ref-link').value = `https://synergy-protocol.io/join?ref=${testUser}`;
                }
            });
        }

        syncNodeData();
        loadReferralNetwork();

        function copyRef() {
            const copyText = document.getElementById("ref-link");
            copyText.select();
            navigator.clipboard.writeText(copyText.value);
            showToast("LINK COPIED TO CLIPBOARD");
        }

        function showToast(msg) {
            let toast = document.getElementById('synergy-toast');
            if(!toast) {
                toast = document.createElement('div');
                toast.id = 'synergy-toast';
                toast.className = 'synergy-toast';
                document.body.appendChild(toast);
            }
            toast.innerText = msg;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3000);
        }
    </script>
</body>
    </html>
